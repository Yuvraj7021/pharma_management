<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaFlow - Pharmaceutical Management System</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glassmorphism { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark-glassmorphism { background: rgba(30, 58, 138, 0.2); backdrop-filter: blur(15px); border: 1px solid rgba(59, 130, 246, 0.3); }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%); }
        .light-gradient { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #cbd5e1 100%); }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);

            useEffect(() => {
                lucide.createIcons();
            }, []);

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                        <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 animate-fade-in">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl flex items-center justify-center shadow-lg mx-auto mb-4">
                                    <i data-lucide="pill" className="w-10 h-10 text-white"></i>
                                </div>
                                <h1 className="text-3xl font-bold text-gray-900 mb-2">PharmaFlow</h1>
                                <p className="text-gray-600">Welcome back</p>
                            </div>
                            <form onSubmit={(e) => { e.preventDefault(); setIsAuthenticated(true); }} className="space-y-6">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Email</label>
                                    <input type="email" required className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Enter your email" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Password</label>
                                    <input type="password" required className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Enter your password" />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 transition-all font-medium">
                                    Sign In
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen gradient-bg text-white p-6">
                    <div className="max-w-7xl mx-auto">
                        <div className="flex items-center justify-between mb-8">
                            <h1 className="text-4xl font-bold">PharmaFlow Dashboard</h1>
                            <button onClick={() => setIsAuthenticated(false)} className="bg-white/20 px-6 py-2 rounded-lg hover:bg-white/30 transition-colors">
                                Logout
                            </button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="dark-glassmorphism p-6 rounded-2xl">
                                <div className="flex items-center justify-between mb-4">
                                    <div>
                                        <p className="text-sm text-blue-200">Total Medicines</p>
                                        <p className="text-3xl font-bold">150</p>
                                    </div>
                                    <i data-lucide="pill" className="w-8 h-8 text-blue-400"></i>
                                </div>
                            </div>
                            <div className="dark-glassmorphism p-6 rounded-2xl">
                                <div className="flex items-center justify-between mb-4">
                                    <div>
                                        <p className="text-sm text-blue-200">Total Patients</p>
                                        <p className="text-3xl font-bold">45</p>
                                    </div>
                                    <i data-lucide="users" className="w-8 h-8 text-green-400"></i>
                                </div>
                            </div>
                            <div className="dark-glassmorphism p-6 rounded-2xl">
                                <div className="flex items-center justify-between mb-4">
                                    <div>
                                        <p className="text-sm text-blue-200">Low Stock Alert</p>
                                        <p className="text-3xl font-bold">8</p>
                                    </div>
                                    <i data-lucide="alert-triangle" className="w-8 h-8 text-red-400"></i>
                                </div>
                            </div>
                        </div>
                        <div className="mt-8 dark-glassmorphism p-6 rounded-2xl">
                            <h2 className="text-2xl font-bold mb-4">Welcome to PharmaFlow</h2>
                            <p className="text-blue-200">Your pharmaceutical management system is running successfully!</p>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
