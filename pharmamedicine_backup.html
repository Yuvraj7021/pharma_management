<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaFlow - Pharmaceutical Management System</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body {
            box-sizing: border-box;
        }
        
        .glassmorphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .dark-glassmorphism {
            background: rgba(30, 58, 138, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
        }
        
        .light-gradient {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #cbd5e1 100%);
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }
        
        .hover-scale {
            transition: transform 0.2s ease-in-out;
        }
        
        .hover-scale:hover {
            transform: scale(1.02);
        }
        
        .chatbot-float {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Mock Data
        const mockMedicines = [
            { id: 1, name: 'Paracetamol 500mg', category: 'Pain Relief', quantity: 150, price: 25, currency: 'INR', expiryDate: '2024-12-15', batchNumber: 'PCM001', supplier: 'Cipla Ltd' },
            { id: 2, name: 'Amoxicillin 250mg', category: 'Antibiotic', quantity: 75, price: 180, currency: 'INR', expiryDate: '2024-06-20', batchNumber: 'AMX002', supplier: 'Sun Pharma' },
            { id: 3, name: 'Cetirizine 10mg', category: 'Antihistamine', quantity: 200, price: 45, currency: 'INR', expiryDate: '2025-03-10', batchNumber: 'CTZ003', supplier: 'Dr. Reddy\'s' },
            { id: 4, name: 'Metformin 500mg', category: 'Diabetes', quantity: 5, price: 120, currency: 'INR', expiryDate: '2024-01-15', batchNumber: 'MET004', supplier: 'Lupin Ltd' }
        ];

        const mockPatients = [
            { id: 1, name: 'Rajesh Kumar', age: 45, phone: '+91-9876543210', email: 'rajesh.kumar@email.com', address: 'Mumbai, Maharashtra', medicalHistory: 'Diabetes, Hypertension' },
            { id: 2, name: 'Priya Sharma', age: 32, phone: '+91-8765432109', email: 'priya.sharma@email.com', address: 'Delhi, NCR', medicalHistory: 'Asthma' },
            { id: 3, name: 'Amit Patel', age: 28, phone: '+91-7654321098', email: 'amit.patel@email.com', address: 'Ahmedabad, Gujarat', medicalHistory: 'None' }
        ];

        const mockSuppliers = [
            { id: 1, name: 'Cipla Ltd', contact: '+91-22-2482-1234', email: 'orders@cipla.com', company: 'Cipla Limited', medicines: ['Paracetamol', 'Aspirin', 'Ibuprofen'] },
            { id: 2, name: 'Sun Pharma', contact: '+91-22-4324-4324', email: 'supply@sunpharma.com', company: 'Sun Pharmaceutical Industries Ltd', medicines: ['Amoxicillin', 'Azithromycin'] },
            { id: 3, name: 'Dr. Reddy\'s', contact: '+91-40-4900-2900', email: 'orders@drreddys.com', company: 'Dr. Reddy\'s Laboratories Ltd', medicines: ['Cetirizine', 'Loratadine'] }
        ];

        const currencies = [
            { code: 'INR', symbol: '₹', name: 'Indian Rupee' },
            { code: 'USD', symbol: '$', name: 'US Dollar' },
            { code: 'EUR', symbol: '€', name: 'Euro' },
            { code: 'GBP', symbol: '£', name: 'British Pound' },
            { code: 'JPY', symbol: '¥', name: 'Japanese Yen' }
        ];

        // Auth Component
        const AuthPage = ({ onLogin, isSignUp, setIsSignUp }) => {
            const [formData, setFormData] = useState({ email: '', password: '', name: '', rememberMe: false });
            const [showPassword, setShowPassword] = useState(false);
            const [errors, setErrors] = useState({});

            const validateForm = () => {
                const newErrors = {};
                if (!formData.email) newErrors.email = 'Email is required';
                if (!formData.password) newErrors.password = 'Password is required';
                if (isSignUp && !formData.name) newErrors.name = 'Name is required';
                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (validateForm()) {
                    onLogin(formData);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                    <div className="max-w-md w-full">
                        <div className="bg-white rounded-2xl shadow-xl p-8 animate-fade-in">
                            <div className="text-center mb-8">
                                <div className="flex items-center justify-center mb-4">
                                    <div className="w-16 h-16 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl flex items-center justify-center shadow-lg">
                                        <svg className="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M19 8h-2v3h-3v2h3v3h2v-3h3v-2h-3V8zM4 6h9v2H4zm0 5h9v2H4zm0 5h9v2H4z"/>
                                        </svg>
                                    </div>
                                </div>
                                <h1 className="text-3xl font-bold text-gray-900 mb-2">PharmaFlow</h1>
                                <p className="text-gray-600">{isSignUp ? 'Create your account' : 'Welcome back'}</p>
                            </div>

                            <form onSubmit={handleSubmit} className="space-y-6">
                                {isSignUp && (
                                    <div>
                                        <label htmlFor="name" className="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                                        <input
                                            id="name"
                                            type="text"
                                            value={formData.name}
                                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                            placeholder="Enter your full name"
                                        />
                                        {errors.name && <p className="text-red-500 text-sm mt-1">{errors.name}</p>}
                                    </div>
                                )}

                                <div>
                                    <label htmlFor="email" className="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                                    <input
                                        id="email"
                                        type="email"
                                        value={formData.email}
                                        onChange={(e) => setFormData({...formData, email: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                        placeholder="Enter your email"
                                    />
                                    {errors.email && <p className="text-red-500 text-sm mt-1">{errors.email}</p>}
                                </div>

                                <div>
                                    <label htmlFor="password" className="block text-sm font-medium text-gray-700 mb-2">Password</label>
                                    <div className="relative">
                                        <input
                                            id="password"
                                            type={showPassword ? 'text' : 'password'}
                                            value={formData.password}
                                            onChange={(e) => setFormData({...formData, password: e.target.value})}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all pr-12"
                                            placeholder="Enter your password"
                                        />
                                        <button
                                            type="button"
                                            onClick={() => setShowPassword(!showPassword)}
                                            className="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
                                        >
                                            <i data-lucide={showPassword ? 'eye-off' : 'eye'} className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                    {errors.password && <p className="text-red-500 text-sm mt-1">{errors.password}</p>}
                                </div>

                                {!isSignUp && (
                                    <div className="flex items-center justify-between">
                                        <label className="flex items-center">
                                            <input
                                                type="checkbox"
                                                checked={formData.rememberMe}
                                                onChange={(e) => setFormData({...formData, rememberMe: e.target.checked})}
                                                className="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
                                            />
                                            <span className="ml-2 text-sm text-gray-600">Remember me</span>
                                        </label>
                                        <a href="#" className="text-sm text-blue-600 hover:text-blue-500">Forgot password?</a>
                                    </div>
                                )}

                                <button
                                    type="submit"
                                    className="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-200 transition-all font-medium"
                                >
                                    {isSignUp ? 'Create Account' : 'Sign In'}
                                </button>
                            </form>

                            <div className="mt-6 text-center">
                                <p className="text-gray-600">
                                    {isSignUp ? 'Already have an account?' : "Don't have an account?"}
                                    <button
                                        onClick={() => setIsSignUp(!isSignUp)}
                                        className="ml-1 text-blue-600 hover:text-blue-500 font-medium"
                                    >
                                        {isSignUp ? 'Sign In' : 'Sign Up'}
                                    </button>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Dashboard Component
        const Dashboard = ({ darkMode, setDarkMode, currentPage, setCurrentPage, setIsAuthenticated }) => {
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [chatbotOpen, setChatbotOpen] = useState(false);
            const [medicines, setMedicines] = useState(mockMedicines);
            const [patients, setPatients] = useState(mockPatients);
            const [suppliers, setSuppliers] = useState(mockSuppliers);
            const [searchTerm, setSearchTerm] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [showSearchResults, setShowSearchResults] = useState(false);
            const [showNotifications, setShowNotifications] = useState(false);

            const menuItems = [
                { id: 'dashboard', name: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'inventory', name: 'Inventory Management', icon: 'pill' },
                { id: 'expired', name: 'Expired Medicines', icon: 'clock' },
                { id: 'patients', name: 'Patients', icon: 'users' },
                { id: 'prescriptions', name: 'Prescriptions', icon: 'file-text' },
                { id: 'suppliers', name: 'Suppliers', icon: 'truck' },
                { id: 'settings', name: 'Settings', icon: 'settings' }
            ];

            const getExpiredMedicines = () => {
                const today = new Date();
                return medicines.filter(med => {
                    const expiryDate = new Date(med.expiryDate);
                    const daysUntilExpiry = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
                    return daysUntilExpiry <= 30;
                });
            };

            const getLowStockMedicines = () => {
                return medicines.filter(med => med.quantity <= 10);
            };

            // Calculate notification counts
            const today = new Date();
            const expiredCount = medicines.filter(med => new Date(med.expiryDate) <= today).length;
            const nearExpiryCount = medicines.filter(med => {
                const expiryDate = new Date(med.expiryDate);
                const daysUntilExpiry = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
                return daysUntilExpiry > 0 && daysUntilExpiry <= 30;
            }).length;
            const lowStockCount = medicines.filter(med => med.quantity <= 10).length;

            // Search functionality
            useEffect(() => {
                if (searchTerm.trim()) {
                    const results = [];
                    
                    // Search medicines
                    medicines.forEach(med => {
                        if (med.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                            med.category.toLowerCase().includes(searchTerm.toLowerCase()) ||
                            med.supplier.toLowerCase().includes(searchTerm.toLowerCase())) {
                            results.push({
                                type: 'medicine',
                                id: med.id,
                                title: med.name,
                                subtitle: `${med.category} • Qty: ${med.quantity}`,
                                icon: 'pill',
                                action: () => setCurrentPage('inventory')
                            });
                        }
                    });
                    
                    // Search patients
                    patients.forEach(patient => {
                        if (patient.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                            patient.phone.includes(searchTerm) ||
                            patient.email.toLowerCase().includes(searchTerm.toLowerCase())) {
                            results.push({
                                type: 'patient',
                                id: patient.id,
                                title: patient.name,
                                subtitle: `Age: ${patient.age} • ${patient.phone}`,
                                icon: 'user',
                                action: () => setCurrentPage('patients')
                            });
                        }
                    });
                    
                    // Search suppliers
                    suppliers.forEach(supplier => {
                        if (supplier.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                            supplier.company.toLowerCase().includes(searchTerm.toLowerCase())) {
                            results.push({
                                type: 'supplier',
                                id: supplier.id,
                                title: supplier.name,
                                subtitle: supplier.company,
                                icon: 'truck',
                                action: () => setCurrentPage('suppliers')
                            });
                        }
                    });
                    
                    // Add general suggestions
                    if (searchTerm.toLowerCase().includes('prescription')) {
                        results.push({
                            type: 'action',
                            id: 'prescription',
                            title: 'Create Prescription',
                            subtitle: 'Create a new prescription for patients',
                            icon: 'file-text',
                            action: () => setCurrentPage('prescriptions')
                        });
                    }
                    
                    if (searchTerm.toLowerCase().includes('expired')) {
                        results.push({
                            type: 'action',
                            id: 'expired',
                            title: 'View Expired Medicines',
                            subtitle: 'Check medicines that have expired',
                            icon: 'clock',
                            action: () => setCurrentPage('expired')
                        });
                    }
                    
                    setSearchResults(results.slice(0, 8)); // Limit to 8 results
                    setShowSearchResults(true);
                } else {
                    setSearchResults([]);
                    setShowSearchResults(false);
                }
            }, [searchTerm, medicines, patients, suppliers]);

            useEffect(() => {
                lucide.createIcons();
            }, [currentPage, darkMode]);

            const renderContent = () => {
                switch (currentPage) {
                    case 'dashboard':
                        return <DashboardHome medicines={medicines} patients={patients} suppliers={suppliers} darkMode={darkMode} setCurrentPage={setCurrentPage} />;
                    case 'inventory':
                        return <InventoryManagement medicines={medicines} setMedicines={setMedicines} darkMode={darkMode} searchTerm={searchTerm} />;
                    case 'expired':
                        return <ExpiredMedicines medicines={getExpiredMedicines()} darkMode={darkMode} />;
                    case 'patients':
                        return <PatientManagement patients={patients} setPatients={setPatients} darkMode={darkMode} searchTerm={searchTerm} />;
                    case 'prescriptions':
                        return <PrescriptionManagement patients={patients} medicines={medicines} darkMode={darkMode} />;
                    case 'suppliers':
                        return <SupplierManagement suppliers={suppliers} setSuppliers={setSuppliers} darkMode={darkMode} searchTerm={searchTerm} />;
                    case 'settings':
                        return <Settings darkMode={darkMode} setDarkMode={setDarkMode} />;
                    default:
                        return <DashboardHome medicines={medicines} patients={patients} suppliers={suppliers} darkMode={darkMode} setCurrentPage={setCurrentPage} />;
                }
            };

            return (
                <div className={`min-h-screen ${darkMode ? 'gradient-bg text-white' : 'light-gradient text-gray-900'} transition-all duration-300`}>
                    {/* Sidebar */}
                    <div className={`fixed left-0 top-0 h-full w-64 ${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} transform transition-transform duration-300 z-30 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6">
                            <h1 className="text-2xl font-bold mb-8">PharmaFlow</h1>
                            <nav className="space-y-2">
                                {menuItems.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => setCurrentPage(item.id)}
                                        className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all hover-scale ${
                                            currentPage === item.id 
                                                ? (darkMode ? 'bg-blue-600 text-white' : 'bg-blue-100 text-blue-700')
                                                : (darkMode ? 'hover:bg-blue-800/50' : 'hover:bg-white/50')
                                        }`}
                                    >
                                        <i data-lucide={item.icon} className="w-5 h-5"></i>
                                        <span>{item.name}</span>
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className={`transition-all duration-300 ${sidebarOpen ? 'ml-64' : 'ml-0'}`}>
                        {/* Top Navigation */}
                        <header className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-4 flex items-center justify-between`}>
                            <div className="flex items-center space-x-4">
                                <button
                                    onClick={() => setSidebarOpen(!sidebarOpen)}
                                    className="p-2 rounded-lg hover:bg-white/20 transition-colors"
                                >
                                    <i data-lucide="menu" className="w-6 h-6"></i>
                                </button>
                                <div className="relative">
                                    <input
                                        type="text"
                                        placeholder="Search medicines, patients, suppliers..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        onFocus={() => setShowSearchResults(searchTerm.trim() !== '')}
                                        onBlur={() => setTimeout(() => setShowSearchResults(false), 200)}
                                        className={`pl-10 pr-4 py-2 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white placeholder-blue-200' : 'bg-white/50 text-gray-900 placeholder-gray-500'} focus:ring-2 focus:ring-blue-500 transition-all w-80`}
                                    />
                                    <i data-lucide="search" className="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                                    
                                    {/* Search Results Dropdown */}
                                    {showSearchResults && searchResults.length > 0 && (
                                        <div className={`absolute top-full left-0 right-0 mt-2 ${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-lg shadow-xl z-50 max-h-96 overflow-y-auto`}>
                                            <div className="p-2">
                                                <p className={`text-xs font-medium ${darkMode ? 'text-blue-200' : 'text-gray-600'} px-3 py-2`}>
                                                    Search Results ({searchResults.length})
                                                </p>
                                                {searchResults.map((result) => (
                                                    <button
                                                        key={`${result.type}-${result.id}`}
                                                        onClick={() => {
                                                            result.action();
                                                            setShowSearchResults(false);
                                                            setSearchTerm('');
                                                        }}
                                                        className={`w-full flex items-center space-x-3 px-3 py-3 rounded-lg hover:bg-white/10 transition-colors text-left`}
                                                    >
                                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${
                                                            result.type === 'medicine' ? 'bg-blue-100' :
                                                            result.type === 'patient' ? 'bg-green-100' :
                                                            result.type === 'supplier' ? 'bg-purple-100' :
                                                            'bg-orange-100'
                                                        }`}>
                                                            <i data-lucide={result.icon} className={`w-4 h-4 ${
                                                                result.type === 'medicine' ? 'text-blue-600' :
                                                                result.type === 'patient' ? 'text-green-600' :
                                                                result.type === 'supplier' ? 'text-purple-600' :
                                                                'text-orange-600'
                                                            }`}></i>
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <p className="font-medium text-sm truncate">{result.title}</p>
                                                            <p className={`text-xs ${darkMode ? 'text-blue-200' : 'text-gray-600'} truncate`}>
                                                                {result.subtitle}
                                                            </p>
                                                        </div>
                                                        <span className={`px-2 py-1 rounded-full text-xs ${
                                                            result.type === 'medicine' ? 'bg-blue-100 text-blue-800' :
                                                            result.type === 'patient' ? 'bg-green-100 text-green-800' :
                                                            result.type === 'supplier' ? 'bg-purple-100 text-purple-800' :
                                                            'bg-orange-100 text-orange-800'
                                                        }`}>
                                                            {result.type}
                                                        </span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    
                                    {/* No Results */}
                                    {showSearchResults && searchResults.length === 0 && searchTerm.trim() && (
                                        <div className={`absolute top-full left-0 right-0 mt-2 ${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-lg shadow-xl z-50`}>
                                            <div className="p-4 text-center">
                                                <i data-lucide="search-x" className="w-8 h-8 mx-auto mb-2 text-gray-400"></i>
                                                <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                                    No results found for "{searchTerm}"
                                                </p>
                                                <p className={`text-xs ${darkMode ? 'text-blue-300' : 'text-gray-500'} mt-1`}>
                                                    Try searching for medicines, patients, or suppliers
                                                </p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="flex items-center space-x-4">
                                <button
                                    onClick={() => setDarkMode(!darkMode)}
                                    className="p-2 rounded-lg hover:bg-white/20 transition-colors"
                                    title={darkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'}
                                >
                                    <i data-lucide={darkMode ? 'sun' : 'moon'} className="w-6 h-6"></i>
                                </button>
                                <div className="relative">
                                    <button 
                                        onClick={() => setShowNotifications(!showNotifications)}
                                        className="p-2 rounded-lg hover:bg-white/20 transition-colors relative"
                                    >
                                        <i data-lucide="bell" className="w-6 h-6"></i>
                                        {(expiredCount + nearExpiryCount + lowStockCount) > 0 && (
                                            <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
                                                {expiredCount + nearExpiryCount + lowStockCount}
                                            </span>
                                        )}
                                    </button>
                                    
                                    {/* Notifications Dropdown */}
                                    {showNotifications && (
                                        <div className={`absolute top-full right-0 mt-2 w-80 ${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-lg shadow-xl z-50 max-h-96 overflow-y-auto`}>
                                            <div className="p-4 border-b border-white/10">
                                                <h3 className="font-semibold">Notifications</h3>
                                                <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                                    {expiredCount + nearExpiryCount + lowStockCount} alerts
                                                </p>
                                            </div>
                                            <div className="p-2 space-y-2">
                                                {expiredCount > 0 && (
                                                    <button
                                                        onClick={() => {
                                                            setCurrentPage('expired');
                                                            setShowNotifications(false);
                                                        }}
                                                        className="w-full p-3 rounded-lg bg-red-100/20 border border-red-200/30 hover:bg-red-100/30 transition-colors text-left"
                                                    >
                                                        <div className="flex items-center space-x-3">
                                                            <div className="w-8 h-8 bg-red-100 rounded-lg flex items-center justify-center">
                                                                <i data-lucide="alert-circle" className="w-4 h-4 text-red-600"></i>
                                                            </div>
                                                            <div className="flex-1">
                                                                <p className="font-medium text-sm text-red-600">Expired Medicines</p>
                                                                <p className="text-xs text-red-500">{expiredCount} medicines have expired</p>
                                                            </div>
                                                        </div>
                                                    </button>
                                                )}
                                                
                                                {nearExpiryCount > 0 && (
                                                    <button
                                                        onClick={() => {
                                                            setCurrentPage('expired');
                                                            setShowNotifications(false);
                                                        }}
                                                        className="w-full p-3 rounded-lg bg-yellow-100/20 border border-yellow-200/30 hover:bg-yellow-100/30 transition-colors text-left"
                                                    >
                                                        <div className="flex items-center space-x-3">
                                                            <div className="w-8 h-8 bg-yellow-100 rounded-lg flex items-center justify-center">
                                                                <i data-lucide="clock" className="w-4 h-4 text-yellow-600"></i>
                                                            </div>
                                                            <div className="flex-1">
                                                                <p className="font-medium text-sm text-yellow-600">Near Expiry</p>
                                                                <p className="text-xs text-yellow-500">{nearExpiryCount} medicines expiring within 30 days</p>
                                                            </div>
                                                        </div>
                                                    </button>
                                                )}
                                                
                                                {lowStockCount > 0 && (
                                                    <button
                                                        onClick={() => {
                                                            setCurrentPage('inventory');
                                                            setShowNotifications(false);
                                                        }}
                                                        className="w-full p-3 rounded-lg bg-orange-100/20 border border-orange-200/30 hover:bg-orange-100/30 transition-colors text-left"
                                                    >
                                                        <div className="flex items-center space-x-3">
                                                            <div className="w-8 h-8 bg-orange-100 rounded-lg flex items-center justify-center">
                                                                <i data-lucide="alert-triangle" className="w-4 h-4 text-orange-600"></i>
                                                            </div>
                                                            <div className="flex-1">
                                                                <p className="font-medium text-sm text-orange-600">Low Stock Alert</p>
                                                                <p className="text-xs text-orange-500">{lowStockCount} items are running low</p>
                                                            </div>
                                                        </div>
                                                    </button>
                                                )}
                                                
                                                {(expiredCount + nearExpiryCount + lowStockCount) === 0 && (
                                                    <div className="p-4 text-center">
                                                        <i data-lucide="check-circle" className="w-8 h-8 mx-auto mb-2 text-green-500"></i>
                                                        <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                                            No notifications
                                                        </p>
                                                        <p className={`text-xs ${darkMode ? 'text-blue-300' : 'text-gray-500'} mt-1`}>
                                                            All systems are running smoothly
                                                        </p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <button
                                    onClick={() => setIsAuthenticated(false)}
                                    className="p-2 rounded-lg hover:bg-white/20 transition-colors"
                                    title="Logout"
                                >
                                    <i data-lucide="log-out" className="w-6 h-6"></i>
                                </button>
                                <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">
                                    <span className="text-white font-medium">A</span>
                                </div>
                            </div>
                        </header>

                        {/* Page Content */}
                        <main className="p-6 animate-fade-in">
                            {renderContent()}
                        </main>
                    </div>

                    {/* Chatbot */}
                    <div className="fixed bottom-6 right-6 z-50">
                        <button
                            onClick={() => setChatbotOpen(!chatbotOpen)}
                            className={`w-14 h-14 rounded-full ${darkMode ? 'bg-blue-600' : 'bg-blue-500'} text-white shadow-lg hover:shadow-xl transition-all chatbot-float`}
                        >
                            <i data-lucide="message-circle" className="w-6 h-6 mx-auto"></i>
                        </button>
                        
                        {chatbotOpen && (
                            <div className={`absolute bottom-16 right-0 w-80 h-96 ${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl shadow-xl animate-slide-in`}>
                                <Chatbot darkMode={darkMode} medicines={medicines} patients={patients} />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Dashboard Home Component
        const DashboardHome = ({ medicines, patients, suppliers, darkMode, setCurrentPage }) => {
            const expiredCount = medicines.filter(med => new Date(med.expiryDate) <= new Date()).length;
            const lowStockCount = medicines.filter(med => med.quantity <= 10).length;
            const totalRevenue = medicines.reduce((sum, med) => sum + (med.price * med.quantity), 0);
            const nearExpiryCount = medicines.filter(med => {
                const expiryDate = new Date(med.expiryDate);
                const today = new Date();
                const daysUntilExpiry = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
                return daysUntilExpiry > 0 && daysUntilExpiry <= 30;
            }).length;

            const stats = [
                { title: 'Total Medicines', value: medicines.length, icon: 'pill', color: 'blue', trend: '+12%', trendUp: true },
                { title: 'Total Revenue', value: `₹${totalRevenue.toLocaleString()}`, icon: 'trending-up', color: 'green', trend: '+8.2%', trendUp: true },
                { title: 'Total Patients', value: patients.length, icon: 'users', color: 'purple', trend: '+5.1%', trendUp: true },
                { title: 'Low Stock Alert', value: lowStockCount, icon: 'alert-triangle', color: 'red', trend: '-2.3%', trendUp: false }
            ];

            const quickActions = [
                { title: 'Add Medicine', icon: 'plus-circle', color: 'blue', action: 'inventory' },
                { title: 'New Patient', icon: 'user-plus', color: 'green', action: 'patients' },
                { title: 'Create Prescription', icon: 'file-plus', color: 'purple', action: 'prescriptions' },
                { title: 'View Reports', icon: 'bar-chart-3', color: 'orange', action: 'expired' }
            ];

            return (
                <div className="space-y-8">
                    <div className="flex items-center justify-between">
                        <div>
                            <h1 className="text-4xl font-bold mb-2">Welcome to PharmaFlow</h1>
                            <p className={`text-lg ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                Here's what's happening with your pharmacy today.
                            </p>
                        </div>
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-4 rounded-2xl`}>
                            <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Today's Date</p>
                            <p className="text-xl font-bold">{new Date().toLocaleDateString('en-IN')}</p>
                        </div>
                    </div>
                    
                    {/* Enhanced Stats Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {stats.map((stat, index) => (
                            <div key={index} className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl hover-scale relative overflow-hidden`}>
                                <div className="flex items-center justify-between mb-4">
                                    <div className={`p-3 rounded-xl bg-${stat.color}-100`}>
                                        <i data-lucide={stat.icon} className={`w-6 h-6 text-${stat.color}-600`}></i>
                                    </div>
                                    <div className={`flex items-center space-x-1 text-sm ${stat.trendUp ? 'text-green-500' : 'text-red-500'}`}>
                                        <i data-lucide={stat.trendUp ? 'trending-up' : 'trending-down'} className="w-4 h-4"></i>
                                        <span>{stat.trend}</span>
                                    </div>
                                </div>
                                <div>
                                    <p className={`text-sm font-medium ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>{stat.title}</p>
                                    <p className="text-3xl font-bold mt-1">{stat.value}</p>
                                </div>
                                <div className={`absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-${stat.color}-400 to-${stat.color}-600`}></div>
                            </div>
                        ))}
                    </div>

                    {/* Quick Actions */}
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                        <h3 className="text-2xl font-semibold mb-6">Quick Actions</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            {quickActions.map((action, index) => (
                                <button
                                    key={index}
                                    onClick={() => setCurrentPage(action.action)}
                                    className={`p-6 rounded-xl border-2 border-dashed ${darkMode ? 'border-blue-400/30 hover:border-blue-400/60' : 'border-gray-300 hover:border-gray-400'} hover-scale transition-all group`}
                                >
                                    <div className={`w-12 h-12 mx-auto mb-3 rounded-xl bg-${action.color}-100 flex items-center justify-center group-hover:scale-110 transition-transform`}>
                                        <i data-lucide={action.icon} className={`w-6 h-6 text-${action.color}-600`}></i>
                                    </div>
                                    <p className="font-medium text-center">{action.title}</p>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Enhanced Activity Sections */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Recent Medicines */}
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-xl font-semibold">Recent Medicines</h3>
                                <i data-lucide="pill" className="w-5 h-5 text-blue-500"></i>
                            </div>
                            <div className="space-y-3">
                                {medicines.slice(0, 4).map(med => (
                                    <div key={med.id} className="flex items-center justify-between p-3 rounded-lg bg-white/10 hover:bg-white/20 transition-colors">
                                        <div className="flex items-center space-x-3">
                                            <div className="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center">
                                                <i data-lucide="pill" className="w-4 h-4 text-blue-600"></i>
                                            </div>
                                            <div>
                                                <p className="font-medium text-sm">{med.name}</p>
                                                <p className={`text-xs ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Qty: {med.quantity}</p>
                                            </div>
                                        </div>
                                        <span className={`px-2 py-1 rounded-full text-xs ${med.quantity <= 10 ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}`}>
                                            {med.quantity <= 10 ? 'Low' : 'OK'}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Recent Patients */}
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-xl font-semibold">Recent Patients</h3>
                                <i data-lucide="users" className="w-5 h-5 text-green-500"></i>
                            </div>
                            <div className="space-y-3">
                                {patients.slice(0, 4).map(patient => (
                                    <div key={patient.id} className="flex items-center space-x-3 p-3 rounded-lg bg-white/10 hover:bg-white/20 transition-colors">
                                        <div className="w-10 h-10 bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center">
                                            <span className="text-white font-medium text-sm">{patient.name.charAt(0)}</span>
                                        </div>
                                        <div>
                                            <p className="font-medium text-sm">{patient.name}</p>
                                            <p className={`text-xs ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Age: {patient.age}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Alerts & Notifications */}
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-xl font-semibold">Alerts</h3>
                                <i data-lucide="bell" className="w-5 h-5 text-red-500"></i>
                            </div>
                            <div className="space-y-3">
                                {expiredCount > 0 && (
                                    <button
                                        onClick={() => setCurrentPage('expired')}
                                        className="w-full p-3 rounded-lg bg-red-100/20 border border-red-200/30 hover:bg-red-100/30 transition-colors text-left"
                                    >
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center space-x-2">
                                                <i data-lucide="alert-circle" className="w-4 h-4 text-red-500"></i>
                                                <p className="text-sm font-medium text-red-600">{expiredCount} Expired Medicines</p>
                                            </div>
                                            <i data-lucide="chevron-right" className="w-4 h-4 text-red-500"></i>
                                        </div>
                                        <p className="text-xs text-red-500 mt-1 ml-6">Click to view expired medicines</p>
                                    </button>
                                )}
                                {nearExpiryCount > 0 && (
                                    <button
                                        onClick={() => setCurrentPage('expired')}
                                        className="w-full p-3 rounded-lg bg-yellow-100/20 border border-yellow-200/30 hover:bg-yellow-100/30 transition-colors text-left"
                                    >
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center space-x-2">
                                                <i data-lucide="clock" className="w-4 h-4 text-yellow-500"></i>
                                                <p className="text-sm font-medium text-yellow-600">{nearExpiryCount} Near Expiry</p>
                                            </div>
                                            <i data-lucide="chevron-right" className="w-4 h-4 text-yellow-500"></i>
                                        </div>
                                        <p className="text-xs text-yellow-500 mt-1 ml-6">Medicines expiring within 30 days</p>
                                    </button>
                                )}
                                {lowStockCount > 0 && (
                                    <button
                                        onClick={() => setCurrentPage('inventory')}
                                        className="w-full p-3 rounded-lg bg-orange-100/20 border border-orange-200/30 hover:bg-orange-100/30 transition-colors text-left"
                                    >
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center space-x-2">
                                                <i data-lucide="alert-triangle" className="w-4 h-4 text-orange-500"></i>
                                                <p className="text-sm font-medium text-orange-600">{lowStockCount} Low Stock Items</p>
                                            </div>
                                            <i data-lucide="chevron-right" className="w-4 h-4 text-orange-500"></i>
                                        </div>
                                        <p className="text-xs text-orange-500 mt-1 ml-6">Items with quantity ≤ 10</p>
                                    </button>
                                )}
                                {expiredCount === 0 && nearExpiryCount === 0 && lowStockCount === 0 && (
                                    <div className="p-3 rounded-lg bg-green-100/20 border border-green-200/30">
                                        <div className="flex items-center space-x-2">
                                            <i data-lucide="check-circle" className="w-4 h-4 text-green-500"></i>
                                            <p className="text-sm font-medium text-green-600">All systems normal</p>
                                        </div>
                                        <p className="text-xs text-green-500 mt-1 ml-6">No alerts at this time</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Inventory Management Component
        const InventoryManagement = ({ medicines, setMedicines, darkMode, searchTerm }) => {
            const [showAddForm, setShowAddForm] = useState(false);
            const [editingMedicine, setEditingMedicine] = useState(null);
            const [sortBy, setSortBy] = useState('name');
            const [filterBy, setFilterBy] = useState('all');

            const filteredMedicines = medicines.filter(med => 
                med.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                med.category.toLowerCase().includes(searchTerm.toLowerCase())
            ).filter(med => {
                if (filterBy === 'expired') return new Date(med.expiryDate) <= new Date();
                if (filterBy === 'low-stock') return med.quantity <= 10;
                return true;
            }).sort((a, b) => {
                if (sortBy === 'name') return a.name.localeCompare(b.name);
                if (sortBy === 'quantity') return b.quantity - a.quantity;
                if (sortBy === 'expiry') return new Date(a.expiryDate) - new Date(b.expiryDate);
                return 0;
            });

            const handleAddMedicine = (medicineData) => {
                const newMedicine = {
                    id: Date.now(),
                    ...medicineData
                };
                setMedicines([...medicines, newMedicine]);
                setShowAddForm(false);
            };

            const handleEditMedicine = (medicineData) => {
                setMedicines(medicines.map(med => 
                    med.id === editingMedicine.id ? { ...editingMedicine, ...medicineData } : med
                ));
                setEditingMedicine(null);
            };

            const handleDeleteMedicine = (id) => {
                setMedicines(medicines.filter(med => med.id !== id));
            };

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h1 className="text-3xl font-bold">Inventory Management</h1>
                        <button
                            onClick={() => setShowAddForm(true)}
                            className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors flex items-center space-x-2"
                        >
                            <i data-lucide="plus" className="w-5 h-5"></i>
                            <span>Add Medicine</span>
                        </button>
                    </div>

                    {/* Filters */}
                    <div className="flex flex-wrap gap-4">
                        <select
                            value={sortBy}
                            onChange={(e) => setSortBy(e.target.value)}
                            className={`px-4 py-2 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                        >
                            <option value="name">Sort by Name</option>
                            <option value="quantity">Sort by Quantity</option>
                            <option value="expiry">Sort by Expiry</option>
                        </select>
                        <select
                            value={filterBy}
                            onChange={(e) => setFilterBy(e.target.value)}
                            className={`px-4 py-2 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                        >
                            <option value="all">All Medicines</option>
                            <option value="expired">Expired</option>
                            <option value="low-stock">Low Stock</option>
                        </select>
                    </div>

                    {/* Medicines Table */}
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl overflow-hidden`}>
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className={`${darkMode ? 'bg-blue-900/50' : 'bg-white/50'}`}>
                                    <tr>
                                        <th className="px-6 py-4 text-left font-semibold">Medicine Name</th>
                                        <th className="px-6 py-4 text-left font-semibold">Category</th>
                                        <th className="px-6 py-4 text-left font-semibold">Quantity</th>
                                        <th className="px-6 py-4 text-left font-semibold">Price</th>
                                        <th className="px-6 py-4 text-left font-semibold">Expiry Date</th>
                                        <th className="px-6 py-4 text-left font-semibold">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredMedicines.map(medicine => (
                                        <tr key={medicine.id} className="border-t border-white/10">
                                            <td className="px-6 py-4">
                                                <div>
                                                    <p className="font-medium">{medicine.name}</p>
                                                    <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Batch: {medicine.batchNumber}</p>
                                                </div>
                                            </td>
                                            <td className="px-6 py-4">{medicine.category}</td>
                                            <td className="px-6 py-4">
                                                <span className={`px-2 py-1 rounded-full text-sm ${medicine.quantity <= 10 ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}`}>
                                                    {medicine.quantity}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4">
                                                {currencies.find(c => c.code === medicine.currency)?.symbol}{medicine.price}
                                            </td>
                                            <td className="px-6 py-4">
                                                <span className={`${new Date(medicine.expiryDate) <= new Date() ? 'text-red-500' : ''}`}>
                                                    {medicine.expiryDate}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4">
                                                <div className="flex space-x-2">
                                                    <button
                                                        onClick={() => setEditingMedicine(medicine)}
                                                        className="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors"
                                                    >
                                                        <i data-lucide="edit" className="w-4 h-4"></i>
                                                    </button>
                                                    <button
                                                        onClick={() => handleDeleteMedicine(medicine.id)}
                                                        className="p-2 text-red-600 hover:bg-red-100 rounded-lg transition-colors"
                                                    >
                                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Add/Edit Medicine Modal */}
                    {(showAddForm || editingMedicine) && (
                        <MedicineForm
                            medicine={editingMedicine}
                            onSubmit={editingMedicine ? handleEditMedicine : handleAddMedicine}
                            onCancel={() => {
                                setShowAddForm(false);
                                setEditingMedicine(null);
                            }}
                            darkMode={darkMode}
                        />
                    )}
                </div>
            );
        };

        // Medicine Form Component
        const MedicineForm = ({ medicine, onSubmit, onCancel, darkMode }) => {
            const [formData, setFormData] = useState({
                name: medicine?.name || '',
                category: medicine?.category || '',
                quantity: medicine?.quantity || '',
                price: medicine?.price || '',
                currency: medicine?.currency || 'INR',
                expiryDate: medicine?.expiryDate || '',
                batchNumber: medicine?.batchNumber || '',
                supplier: medicine?.supplier || ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl p-6 w-full max-w-md animate-fade-in`}>
                        <h2 className="text-2xl font-bold mb-6">{medicine ? 'Edit Medicine' : 'Add New Medicine'}</h2>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label htmlFor="medicineName" className="block text-sm font-medium mb-2">Medicine Name</label>
                                <input
                                    id="medicineName"
                                    type="text"
                                    value={formData.name}
                                    onChange={(e) => setFormData({...formData, name: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="category" className="block text-sm font-medium mb-2">Category</label>
                                <input
                                    id="category"
                                    type="text"
                                    value={formData.category}
                                    onChange={(e) => setFormData({...formData, category: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label htmlFor="quantity" className="block text-sm font-medium mb-2">Quantity</label>
                                    <input
                                        id="quantity"
                                        type="number"
                                        value={formData.quantity}
                                        onChange={(e) => setFormData({...formData, quantity: parseInt(e.target.value)})}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                        required
                                    />
                                </div>
                                <div>
                                    <label htmlFor="price" className="block text-sm font-medium mb-2">Price</label>
                                    <div className="flex">
                                        <select
                                            value={formData.currency}
                                            onChange={(e) => setFormData({...formData, currency: e.target.value})}
                                            className={`px-3 py-3 rounded-l-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                        >
                                            {currencies.map(curr => (
                                                <option key={curr.code} value={curr.code}>{curr.code}</option>
                                            ))}
                                        </select>
                                        <input
                                            id="price"
                                            type="number"
                                            value={formData.price}
                                            onChange={(e) => setFormData({...formData, price: parseFloat(e.target.value)})}
                                            className={`flex-1 px-4 py-3 rounded-r-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                            required
                                        />
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label htmlFor="expiryDate" className="block text-sm font-medium mb-2">Expiry Date</label>
                                <input
                                    id="expiryDate"
                                    type="date"
                                    value={formData.expiryDate}
                                    onChange={(e) => setFormData({...formData, expiryDate: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="batchNumber" className="block text-sm font-medium mb-2">Batch Number</label>
                                <input
                                    id="batchNumber"
                                    type="text"
                                    value={formData.batchNumber}
                                    onChange={(e) => setFormData({...formData, batchNumber: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="supplier" className="block text-sm font-medium mb-2">Supplier</label>
                                <input
                                    id="supplier"
                                    type="text"
                                    value={formData.supplier}
                                    onChange={(e) => setFormData({...formData, supplier: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div className="flex space-x-4 pt-4">
                                <button
                                    type="submit"
                                    className="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors"
                                >
                                    {medicine ? 'Update Medicine' : 'Add Medicine'}
                                </button>
                                <button
                                    type="button"
                                    onClick={onCancel}
                                    className="flex-1 bg-gray-500 text-white py-3 rounded-lg hover:bg-gray-600 transition-colors"
                                >
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // Expired Medicines Component
        const ExpiredMedicines = ({ medicines, darkMode }) => {
            const today = new Date();
            const expiredMedicines = medicines.filter(med => new Date(med.expiryDate) <= today);
            const nearExpiryMedicines = medicines.filter(med => {
                const expiryDate = new Date(med.expiryDate);
                const daysUntilExpiry = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
                return daysUntilExpiry > 0 && daysUntilExpiry <= 30;
            });

            const generateReport = () => {
                const reportData = {
                    expired: expiredMedicines,
                    nearExpiry: nearExpiryMedicines,
                    generatedAt: new Date().toISOString()
                };
                
                const dataStr = JSON.stringify(reportData, null, 2);
                const dataBlob = new Blob([dataStr], {type: 'application/json'});
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'expired-medicines-report.json';
                link.click();
            };

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h1 className="text-3xl font-bold">Expired Medicines</h1>
                        <button
                            onClick={generateReport}
                            className="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700 transition-colors flex items-center space-x-2"
                        >
                            <i data-lucide="download" className="w-5 h-5"></i>
                            <span>Generate Report</span>
                        </button>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Expired</p>
                                    <p className="text-3xl font-bold text-red-500">{expiredMedicines.length}</p>
                                </div>
                                <i data-lucide="alert-circle" className="w-8 h-8 text-red-500"></i>
                            </div>
                        </div>
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Near Expiry (30 days)</p>
                                    <p className="text-3xl font-bold text-yellow-500">{nearExpiryMedicines.length}</p>
                                </div>
                                <i data-lucide="clock" className="w-8 h-8 text-yellow-500"></i>
                            </div>
                        </div>
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Total Value Lost</p>
                                    <p className="text-3xl font-bold text-red-500">
                                        ₹{expiredMedicines.reduce((sum, med) => sum + (med.price * med.quantity), 0).toLocaleString()}
                                    </p>
                                </div>
                                <i data-lucide="trending-down" className="w-8 h-8 text-red-500"></i>
                            </div>
                        </div>
                    </div>

                    {/* Expired Medicines Table */}
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl overflow-hidden`}>
                        <div className="p-6 border-b border-white/10">
                            <h3 className="text-xl font-semibold text-red-500">Expired Medicines</h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className={`${darkMode ? 'bg-red-900/20' : 'bg-red-50'}`}>
                                    <tr>
                                        <th className="px-6 py-4 text-left font-semibold">Medicine Name</th>
