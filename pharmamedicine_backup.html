                                        <th className="px-6 py-4 text-left font-semibold">Batch Number</th>
                                        <th className="px-6 py-4 text-left font-semibold">Quantity</th>
                                        <th className="px-6 py-4 text-left font-semibold">Expired Date</th>
                                        <th className="px-6 py-4 text-left font-semibold">Value Lost</th>
                                        <th className="px-6 py-4 text-left font-semibold">Supplier</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {expiredMedicines.map(medicine => (
                                        <tr key={medicine.id} className="border-t border-white/10">
                                            <td className="px-6 py-4 font-medium">{medicine.name}</td>
                                            <td className="px-6 py-4">{medicine.batchNumber}</td>
                                            <td className="px-6 py-4">{medicine.quantity}</td>
                                            <td className="px-6 py-4 text-red-500">{medicine.expiryDate}</td>
                                            <td className="px-6 py-4 text-red-500">
                                                {currencies.find(c => c.code === medicine.currency)?.symbol}{(medicine.price * medicine.quantity).toLocaleString()}
                                            </td>
                                            <td className="px-6 py-4">{medicine.supplier}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Near Expiry Medicines */}
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl overflow-hidden`}>
                        <div className="p-6 border-b border-white/10">
                            <h3 className="text-xl font-semibold text-yellow-500">Near Expiry (Next 30 Days)</h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className={`${darkMode ? 'bg-yellow-900/20' : 'bg-yellow-50'}`}>
                                    <tr>
                                        <th className="px-6 py-4 text-left font-semibold">Medicine Name</th>
                                        <th className="px-6 py-4 text-left font-semibold">Batch Number</th>
                                        <th className="px-6 py-4 text-left font-semibold">Quantity</th>
                                        <th className="px-6 py-4 text-left font-semibold">Expiry Date</th>
                                        <th className="px-6 py-4 text-left font-semibold">Days Left</th>
                                        <th className="px-6 py-4 text-left font-semibold">Supplier</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {nearExpiryMedicines.map(medicine => {
                                        const daysLeft = Math.ceil((new Date(medicine.expiryDate) - today) / (1000 * 60 * 60 * 24));
                                        return (
                                            <tr key={medicine.id} className="border-t border-white/10">
                                                <td className="px-6 py-4 font-medium">{medicine.name}</td>
                                                <td className="px-6 py-4">{medicine.batchNumber}</td>
                                                <td className="px-6 py-4">{medicine.quantity}</td>
                                                <td className="px-6 py-4 text-yellow-500">{medicine.expiryDate}</td>
                                                <td className="px-6 py-4">
                                                    <span className={`px-2 py-1 rounded-full text-sm ${daysLeft <= 7 ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800'}`}>
                                                        {daysLeft} days
                                                    </span>
                                                </td>
                                                <td className="px-6 py-4">{medicine.supplier}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // Patient Management Component
        const PatientManagement = ({ patients, setPatients, darkMode, searchTerm }) => {
            const [showAddForm, setShowAddForm] = useState(false);
            const [editingPatient, setEditingPatient] = useState(null);

            const filteredPatients = patients.filter(patient =>
                patient.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                patient.phone.includes(searchTerm) ||
                patient.email.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const handleAddPatient = (patientData) => {
                const newPatient = {
                    id: Date.now(),
                    ...patientData
                };
                setPatients([...patients, newPatient]);
                setShowAddForm(false);
            };

            const handleEditPatient = (patientData) => {
                setPatients(patients.map(patient =>
                    patient.id === editingPatient.id ? { ...editingPatient, ...patientData } : patient
                ));
                setEditingPatient(null);
            };

            const handleDeletePatient = (id) => {
                setPatients(patients.filter(patient => patient.id !== id));
            };

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h1 className="text-3xl font-bold">Patient Management</h1>
                        <button
                            onClick={() => setShowAddForm(true)}
                            className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors flex items-center space-x-2"
                        >
                            <i data-lucide="user-plus" className="w-5 h-5"></i>
                            <span>Add Patient</span>
                        </button>
                    </div>

                    {/* Patients Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredPatients.map(patient => (
                            <div key={patient.id} className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl hover-scale`}>
                                <div className="flex items-start justify-between mb-4">
                                    <div className="flex items-center space-x-3">
                                        <div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center">
                                            <span className="text-white font-bold text-lg">{patient.name.charAt(0)}</span>
                                        </div>
                                        <div>
                                            <h3 className="font-semibold text-lg">{patient.name}</h3>
                                            <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Age: {patient.age}</p>
                                        </div>
                                    </div>
                                    <div className="flex space-x-2">
                                        <button
                                            onClick={() => setEditingPatient(patient)}
                                            className="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors"
                                        >
                                            <i data-lucide="edit" className="w-4 h-4"></i>
                                        </button>
                                        <button
                                            onClick={() => handleDeletePatient(patient.id)}
                                            className="p-2 text-red-600 hover:bg-red-100 rounded-lg transition-colors"
                                        >
                                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="space-y-2">
                                    <div className="flex items-center space-x-2">
                                        <i data-lucide="phone" className="w-4 h-4 text-gray-500"></i>
                                        <span className="text-sm">{patient.phone}</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <i data-lucide="mail" className="w-4 h-4 text-gray-500"></i>
                                        <span className="text-sm">{patient.email}</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <i data-lucide="map-pin" className="w-4 h-4 text-gray-500"></i>
                                        <span className="text-sm">{patient.address}</span>
                                    </div>
                                    <div className="mt-3">
                                        <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Medical History:</p>
                                        <p className="text-sm font-medium">{patient.medicalHistory}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Add/Edit Patient Modal */}
                    {(showAddForm || editingPatient) && (
                        <PatientForm
                            patient={editingPatient}
                            onSubmit={editingPatient ? handleEditPatient : handleAddPatient}
                            onCancel={() => {
                                setShowAddForm(false);
                                setEditingPatient(null);
                            }}
                            darkMode={darkMode}
                        />
                    )}
                </div>
            );
        };

        // Patient Form Component
        const PatientForm = ({ patient, onSubmit, onCancel, darkMode }) => {
            const [formData, setFormData] = useState({
                name: patient?.name || '',
                age: patient?.age || '',
                phone: patient?.phone || '',
                email: patient?.email || '',
                address: patient?.address || '',
                medicalHistory: patient?.medicalHistory || ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl p-6 w-full max-w-md animate-fade-in`}>
                        <h2 className="text-2xl font-bold mb-6">{patient ? 'Edit Patient' : 'Add New Patient'}</h2>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label htmlFor="patientName" className="block text-sm font-medium mb-2">Full Name</label>
                                <input
                                    id="patientName"
                                    type="text"
                                    value={formData.name}
                                    onChange={(e) => setFormData({...formData, name: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label htmlFor="age" className="block text-sm font-medium mb-2">Age</label>
                                    <input
                                        id="age"
                                        type="number"
                                        value={formData.age}
                                        onChange={(e) => setFormData({...formData, age: parseInt(e.target.value)})}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                        required
                                    />
                                </div>
                                <div>
                                    <label htmlFor="phone" className="block text-sm font-medium mb-2">Phone</label>
                                    <input
                                        id="phone"
                                        type="tel"
                                        value={formData.phone}
                                        onChange={(e) => setFormData({...formData, phone: e.target.value})}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                        required
                                    />
                                </div>
                            </div>

                            <div>
                                <label htmlFor="email" className="block text-sm font-medium mb-2">Email</label>
                                <input
                                    id="email"
                                    type="email"
                                    value={formData.email}
                                    onChange={(e) => setFormData({...formData, email: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="address" className="block text-sm font-medium mb-2">Address</label>
                                <textarea
                                    id="address"
                                    value={formData.address}
                                    onChange={(e) => setFormData({...formData, address: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    rows="3"
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="medicalHistory" className="block text-sm font-medium mb-2">Medical History</label>
                                <textarea
                                    id="medicalHistory"
                                    value={formData.medicalHistory}
                                    onChange={(e) => setFormData({...formData, medicalHistory: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    rows="3"
                                    placeholder="Enter medical conditions, allergies, etc."
                                />
                            </div>

                            <div className="flex space-x-4 pt-4">
                                <button
                                    type="submit"
                                    className="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors"
                                >
                                    {patient ? 'Update Patient' : 'Add Patient'}
                                </button>
                                <button
                                    type="button"
                                    onClick={onCancel}
                                    className="flex-1 bg-gray-500 text-white py-3 rounded-lg hover:bg-gray-600 transition-colors"
                                >
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // Prescription Management Component
        const PrescriptionManagement = ({ patients, medicines, darkMode }) => {
            const [prescriptions, setPrescriptions] = useState([]);
            const [showAddForm, setShowAddForm] = useState(false);

            const handleAddPrescription = (prescriptionData) => {
                const newPrescription = {
                    id: Date.now(),
                    ...prescriptionData,
                    date: new Date().toISOString().split('T')[0]
                };
                setPrescriptions([...prescriptions, newPrescription]);
                setShowAddForm(false);
            };

            const printPrescription = (prescription) => {
                const printWindow = window.open('', '_blank');
                const patient = patients.find(p => p.id === prescription.patientId);
                
                printWindow.document.write(`
                    <html>
                        <head>
                            <title>Prescription - ${patient?.name}</title>
                            <style>
                                body { font-family: Arial, sans-serif; padding: 20px; }
                                .header { text-align: center; margin-bottom: 30px; }
                                .patient-info { margin-bottom: 20px; }
                                .medicines { margin-top: 20px; }
                                table { width: 100%; border-collapse: collapse; }
                                th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                                th { background-color: #f2f2f2; }
                            </style>
                        </head>
                        <body>
                            <div class="header">
                                <h1>PharmaFlow</h1>
                                <h2>Medical Prescription</h2>
                            </div>
                            <div class="patient-info">
                                <p><strong>Patient:</strong> ${patient?.name}</p>
                                <p><strong>Age:</strong> ${patient?.age}</p>
                                <p><strong>Date:</strong> ${prescription.date}</p>
                                <p><strong>Doctor:</strong> ${prescription.doctor}</p>
                            </div>
                            <div class="medicines">
                                <h3>Prescribed Medicines:</h3>
                                <table>
                                    <tr>
                                        <th>Medicine</th>
                                        <th>Dosage</th>
                                        <th>Frequency</th>
                                        <th>Duration</th>
                                    </tr>
                                    ${prescription.medicines.map(med => `
                                        <tr>
                                            <td>${med.name}</td>
                                            <td>${med.dosage}</td>
                                            <td>${med.frequency}</td>
                                            <td>${med.duration}</td>
                                        </tr>
                                    `).join('')}
                                </table>
                            </div>
                            <div style="margin-top: 30px;">
                                <p><strong>Notes:</strong> ${prescription.notes || 'None'}</p>
                            </div>
                        </body>
                    </html>
                `);
                printWindow.document.close();
                printWindow.print();
            };

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h1 className="text-3xl font-bold">Prescription Management</h1>
                        <button
                            onClick={() => setShowAddForm(true)}
                            className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors flex items-center space-x-2"
                        >
                            <i data-lucide="file-plus" className="w-5 h-5"></i>
                            <span>New Prescription</span>
                        </button>
                    </div>

                    {/* Prescriptions List */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {prescriptions.map(prescription => {
                            const patient = patients.find(p => p.id === prescription.patientId);
                            return (
                                <div key={prescription.id} className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl hover-scale`}>
                                    <div className="flex items-start justify-between mb-4">
                                        <div>
                                            <h3 className="text-lg font-semibold">{patient?.name}</h3>
                                            <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                                Dr. {prescription.doctor} • {prescription.date}
                                            </p>
                                        </div>
                                        <button
                                            onClick={() => printPrescription(prescription)}
                                            className="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors"
                                        >
                                            <i data-lucide="printer" className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                    
                                    <div className="space-y-2">
                                        <h4 className="font-medium">Prescribed Medicines:</h4>
                                        {prescription.medicines.map((med, index) => (
                                            <div key={index} className="bg-white/10 p-3 rounded-lg">
                                                <p className="font-medium">{med.name}</p>
                                                <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                                    {med.dosage} • {med.frequency} • {med.duration}
                                                </p>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {prescription.notes && (
                                        <div className="mt-4">
                                            <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Notes:</p>
                                            <p className="text-sm">{prescription.notes}</p>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {prescriptions.length === 0 && (
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-12 rounded-2xl text-center`}>
                            <i data-lucide="file-text" className="w-16 h-16 mx-auto mb-4 text-gray-400"></i>
                            <h3 className="text-xl font-semibold mb-2">No Prescriptions Yet</h3>
                            <p className={`${darkMode ? 'text-blue-200' : 'text-gray-600'} mb-4`}>
                                Start by creating your first prescription for a patient.
                            </p>
                            <button
                                onClick={() => setShowAddForm(true)}
                                className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors"
                            >
                                Create Prescription
                            </button>
                        </div>
                    )}

                    {/* Add Prescription Modal */}
                    {showAddForm && (
                        <PrescriptionForm
                            patients={patients}
                            medicines={medicines}
                            onSubmit={handleAddPrescription}
                            onCancel={() => setShowAddForm(false)}
                            darkMode={darkMode}
                        />
                    )}
                </div>
            );
        };

        // Prescription Form Component
        const PrescriptionForm = ({ patients, medicines, onSubmit, onCancel, darkMode }) => {
            const [formData, setFormData] = useState({
                patientId: '',
                doctor: '',
                medicines: [{ name: '', dosage: '', frequency: '', duration: '' }],
                notes: ''
            });

            const addMedicine = () => {
                setFormData({
                    ...formData,
                    medicines: [...formData.medicines, { name: '', dosage: '', frequency: '', duration: '' }]
                });
            };

            const removeMedicine = (index) => {
                setFormData({
                    ...formData,
                    medicines: formData.medicines.filter((_, i) => i !== index)
                });
            };

            const updateMedicine = (index, field, value) => {
                const updatedMedicines = formData.medicines.map((med, i) =>
                    i === index ? { ...med, [field]: value } : med
                );
                setFormData({ ...formData, medicines: updatedMedicines });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl p-6 w-full max-w-2xl animate-fade-in max-h-[90vh] overflow-y-auto`}>
                        <h2 className="text-2xl font-bold mb-6">New Prescription</h2>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label htmlFor="patient" className="block text-sm font-medium mb-2">Patient</label>
                                    <select
                                        id="patient"
                                        value={formData.patientId}
                                        onChange={(e) => setFormData({...formData, patientId: parseInt(e.target.value)})}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                        required
                                    >
                                        <option value="">Select Patient</option>
                                        {patients.map(patient => (
                                            <option key={patient.id} value={patient.id}>{patient.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <div>
                                    <label htmlFor="doctor" className="block text-sm font-medium mb-2">Doctor Name</label>
                                    <input
                                        id="doctor"
                                        type="text"
                                        value={formData.doctor}
                                        onChange={(e) => setFormData({...formData, doctor: e.target.value})}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                        required
                                    />
                                </div>
                            </div>

                            <div>
                                <div className="flex items-center justify-between mb-4">
                                    <label className="block text-sm font-medium">Medicines</label>
                                    <button
                                        type="button"
                                        onClick={addMedicine}
                                        className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center space-x-2"
                                    >
                                        <i data-lucide="plus" className="w-4 h-4"></i>
                                        <span>Add Medicine</span>
                                    </button>
                                </div>
                                
                                {formData.medicines.map((medicine, index) => (
                                    <div key={index} className="grid grid-cols-4 gap-2 mb-3 p-4 bg-white/10 rounded-lg">
                                        <div>
                                            <select
                                                value={medicine.name}
                                                onChange={(e) => updateMedicine(index, 'name', e.target.value)}
                                                className={`w-full px-3 py-2 rounded border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                                required
                                            >
                                                <option value="">Select Medicine</option>
                                                {medicines.map(med => (
                                                    <option key={med.id} value={med.name}>{med.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <input
                                            type="text"
                                            placeholder="Dosage"
                                            value={medicine.dosage}
                                            onChange={(e) => updateMedicine(index, 'dosage', e.target.value)}
                                            className={`px-3 py-2 rounded border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                            required
                                        />
                                        <input
                                            type="text"
                                            placeholder="Frequency"
                                            value={medicine.frequency}
                                            onChange={(e) => updateMedicine(index, 'frequency', e.target.value)}
                                            className={`px-3 py-2 rounded border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                            required
                                        />
                                        <div className="flex space-x-2">
                                            <input
                                                type="text"
                                                placeholder="Duration"
                                                value={medicine.duration}
                                                onChange={(e) => updateMedicine(index, 'duration', e.target.value)}
                                                className={`flex-1 px-3 py-2 rounded border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                                required
                                            />
                                            {formData.medicines.length > 1 && (
                                                <button
                                                    type="button"
                                                    onClick={() => removeMedicine(index)}
                                                    className="p-2 text-red-600 hover:bg-red-100 rounded transition-colors"
                                                >
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div>
                                <label htmlFor="notes" className="block text-sm font-medium mb-2">Notes</label>
                                <textarea
                                    id="notes"
                                    value={formData.notes}
                                    onChange={(e) => setFormData({...formData, notes: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    rows="3"
                                    placeholder="Additional instructions or notes..."
                                />
                            </div>

                            <div className="flex space-x-4 pt-4">
                                <button
                                    type="submit"
                                    className="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors"
                                >
                                    Create Prescription
                                </button>
                                <button
                                    type="button"
                                    onClick={onCancel}
                                    className="flex-1 bg-gray-500 text-white py-3 rounded-lg hover:bg-gray-600 transition-colors"
                                >
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // Supplier Management Component
        const SupplierManagement = ({ suppliers, setSuppliers, darkMode, searchTerm }) => {
            const [showAddForm, setShowAddForm] = useState(false);
            const [editingSupplier, setEditingSupplier] = useState(null);

            const filteredSuppliers = suppliers.filter(supplier =>
                supplier.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                supplier.company.toLowerCase().includes(searchTerm.toLowerCase()) ||
                supplier.contact.includes(searchTerm)
            );

            const handleAddSupplier = (supplierData) => {
                const newSupplier = {
                    id: Date.now(),
                    ...supplierData
                };
                setSuppliers([...suppliers, newSupplier]);
                setShowAddForm(false);
            };

            const handleEditSupplier = (supplierData) => {
                setSuppliers(suppliers.map(supplier =>
                    supplier.id === editingSupplier.id ? { ...editingSupplier, ...supplierData } : supplier
                ));
                setEditingSupplier(null);
            };

            const handleDeleteSupplier = (id) => {
                setSuppliers(suppliers.filter(supplier => supplier.id !== id));
            };

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h1 className="text-3xl font-bold">Supplier Management</h1>
                        <button
                            onClick={() => setShowAddForm(true)}
                            className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors flex items-center space-x-2"
                        >
                            <i data-lucide="truck" className="w-5 h-5"></i>
                            <span>Add Supplier</span>
                        </button>
                    </div>

                    {/* Suppliers Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredSuppliers.map(supplier => (
                            <div key={supplier.id} className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl hover-scale`}>
                                <div className="flex items-start justify-between mb-4">
                                    <div>
                                        <h3 className="font-semibold text-lg">{supplier.name}</h3>
                                        <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>{supplier.company}</p>
                                    </div>
                                    <div className="flex space-x-2">
                                        <button
                                            onClick={() => setEditingSupplier(supplier)}
                                            className="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors"
                                        >
                                            <i data-lucide="edit" className="w-4 h-4"></i>
                                        </button>
                                        <button
                                            onClick={() => handleDeleteSupplier(supplier.id)}
                                            className="p-2 text-red-600 hover:bg-red-100 rounded-lg transition-colors"
                                        >
                                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="space-y-2 mb-4">
                                    <div className="flex items-center space-x-2">
                                        <i data-lucide="phone" className="w-4 h-4 text-gray-500"></i>
                                        <span className="text-sm">{supplier.contact}</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <i data-lucide="mail" className="w-4 h-4 text-gray-500"></i>
                                        <span className="text-sm">{supplier.email}</span>
                                    </div>
                                </div>
                                
                                <div>
                                    <p className={`text-sm font-medium mb-2 ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Medicines Supplied:</p>
                                    <div className="flex flex-wrap gap-1">
                                        {supplier.medicines.map((medicine, index) => (
                                            <span key={index} className="px-2 py-1 bg-blue-100 text-blue-800 text-xs rounded-full">
                                                {medicine}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Add/Edit Supplier Modal */}
                    {(showAddForm || editingSupplier) && (
                        <SupplierForm
                            supplier={editingSupplier}
                            onSubmit={editingSupplier ? handleEditSupplier : handleAddSupplier}
                            onCancel={() => {
                                setShowAddForm(false);
                                setEditingSupplier(null);
                            }}
                            darkMode={darkMode}
                        />
                    )}
                </div>
            );
        };

        // Supplier Form Component
        const SupplierForm = ({ supplier, onSubmit, onCancel, darkMode }) => {
            const [formData, setFormData] = useState({
                name: supplier?.name || '',
                company: supplier?.company || '',
                contact: supplier?.contact || '',
                email: supplier?.email || '',
                medicines: supplier?.medicines || []
            });
            const [newMedicine, setNewMedicine] = useState('');

            const addMedicine = () => {
                if (newMedicine.trim()) {
                    setFormData({
                        ...formData,
                        medicines: [...formData.medicines, newMedicine.trim()]
                    });
                    setNewMedicine('');
                }
            };

            const removeMedicine = (index) => {
                setFormData({
                    ...formData,
                    medicines: formData.medicines.filter((_, i) => i !== index)
                });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl p-6 w-full max-w-md animate-fade-in`}>
                        <h2 className="text-2xl font-bold mb-6">{supplier ? 'Edit Supplier' : 'Add New Supplier'}</h2>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label htmlFor="supplierName" className="block text-sm font-medium mb-2">Contact Person Name</label>
                                <input
                                    id="supplierName"
                                    type="text"
                                    value={formData.name}
                                    onChange={(e) => setFormData({...formData, name: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="company" className="block text-sm font-medium mb-2">Company Name</label>
                                <input
                                    id="company"
                                    type="text"
                                    value={formData.company}
                                    onChange={(e) => setFormData({...formData, company: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="contact" className="block text-sm font-medium mb-2">Contact Number</label>
                                <input
                                    id="contact"
                                    type="tel"
                                    value={formData.contact}
                                    onChange={(e) => setFormData({...formData, contact: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="email" className="block text-sm font-medium mb-2">Email</label>
                                <input
                                    id="email"
                                    type="email"
                                    value={formData.email}
                                    onChange={(e) => setFormData({...formData, email: e.target.value})}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium mb-2">Medicines Supplied</label>
                                <div className="flex space-x-2 mb-2">
                                    <input
                                        type="text"
                                        value={newMedicine}
                                        onChange={(e) => setNewMedicine(e.target.value)}
                                        placeholder="Enter medicine name"
                                        className={`flex-1 px-4 py-2 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    />
                                    <button
                                        type="button"
                                        onClick={addMedicine}
                                        className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition-colors"
                                    >
                                        Add
                                    </button>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {formData.medicines.map((medicine, index) => (
                                        <span key={index} className="flex items-center space-x-1 px-2 py-1 bg-blue-100 text-blue-800 text-sm rounded-full">
                                            <span>{medicine}</span>
                                            <button
                                                type="button"
                                                onClick={() => removeMedicine(index)}
                                                className="text-blue-600 hover:text-blue-800"
                                            >
                                                <i data-lucide="x" className="w-3 h-3"></i>
                                            </button>
                                        </span>
                                    ))}
                                </div>
                            </div>

                            <div className="flex space-x-4 pt-4">
                                <button
                                    type="submit"
                                    className="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors"
                                >
                                    {supplier ? 'Update Supplier' : 'Add Supplier'}
                                </button>
                                <button
                                    type="button"
                                    onClick={onCancel}
                                    className="flex-1 bg-gray-500 text-white py-3 rounded-lg hover:bg-gray-600 transition-colors"
                                >
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // Settings Component
        const Settings = ({ darkMode, setDarkMode }) => {
            const [profile, setProfile] = useState({
                name: 'Admin User',
                email: 'admin@pharmacare.com',
                phone: '+91-9876543210',
                pharmacy: 'PharmaCare Medical Store'
            });

            const handleProfileUpdate = (e) => {
                e.preventDefault();
                // Profile update logic would go here
                alert('Profile updated successfully!');
            };

            return (
                <div className="space-y-6">
                    <h1 className="text-3xl font-bold">Settings</h1>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Theme Settings */}
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                            <h3 className="text-xl font-semibold mb-4">Appearance</h3>
                            <div className="space-y-4">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="font-medium">Dark Mode</p>
                                        <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                            Switch between light and dark themes
                                        </p>
                                    </div>
                                    <button
                                        onClick={() => setDarkMode(!darkMode)}
                                        className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${
                                            darkMode ? 'bg-blue-600' : 'bg-gray-200'
                                        }`}
                                    >
                                        <span
                                            className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${
                                                darkMode ? 'translate-x-6' : 'translate-x-1'
                                            }`}
                                        />
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Profile Settings */}
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                            <h3 className="text-xl font-semibold mb-4">Profile Information</h3>
                            <form onSubmit={handleProfileUpdate} className="space-y-4">
                                <div>
                                    <label htmlFor="profileName" className="block text-sm font-medium mb-2">Full Name</label>
                                    <input
                                        id="profileName"
                                        type="text"
                                        value={profile.name}
                                        onChange={(e) => setProfile({...profile, name: e.target.value})}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    />
                                </div>
                                <div>
                                    <label htmlFor="profileEmail" className="block text-sm font-medium mb-2">Email</label>
                                    <input
                                        id="profileEmail"
                                        type="email"
                                        value={profile.email}
                                        onChange={(e) => setProfile({...profile, email: e.target.value})}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    />
                                </div>
                                <div>
                                    <label htmlFor="profilePhone" className="block text-sm font-medium mb-2">Phone</label>
                                    <input
                                        id="profilePhone"
                                        type="tel"
                                        value={profile.phone}
                                        onChange={(e) => setProfile({...profile, phone: e.target.value})}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    />
                                </div>
                                <div>
                                    <label htmlFor="pharmacy" className="block text-sm font-medium mb-2">Pharmacy Name</label>
                                    <input
                                        id="pharmacy"
                                        type="text"
                                        value={profile.pharmacy}
                                        onChange={(e) => setProfile({...profile, pharmacy: e.target.value})}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    />
                                </div>
                                <button
                                    type="submit"
                                    className="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors"
                                >
                                    Update Profile
                                </button>
                            </form>
                        </div>
                    </div>

                    {/* Additional Settings */}
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                        <h3 className="text-xl font-semibold mb-4">System Preferences</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label htmlFor="defaultCurrency" className="block text-sm font-medium mb-2">Default Currency</label>
                                <select
                                    id="defaultCurrency"
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                >
                                    {currencies.map(curr => (
                                        <option key={curr.code} value={curr.code}>
                                            {curr.symbol} {curr.name} ({curr.code})
                                        </option>
                                    ))}
                                </select>
                            </div>
                            <div>
                                <label htmlFor="lowStockAlert" className="block text-sm font-medium mb-2">Low Stock Alert Threshold</label>
                                <input
                                    id="lowStockAlert"
                                    type="number"
                                    defaultValue="10"
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Chatbot Component
        const Chatbot = ({ darkMode, medicines, patients }) => {
            const [messages, setMessages] = useState([
                { id: 1, text: 'Hello! I\'m your PharmaFlow assistant. How can I help you today?', sender: 'bot' }
            ]);
            const [inputMessage, setInputMessage] = useState('');

            const handleSendMessage = (e) => {
                e.preventDefault();
                if (!inputMessage.trim()) return;

                const userMessage = { id: Date.now(), text: inputMessage, sender: 'user' };
                setMessages(prev => [...prev, userMessage]);

                // Simple chatbot responses
                setTimeout(() => {
                    let botResponse = '';
                    const input = inputMessage.toLowerCase();

                    if (input.includes('expired') || input.includes('expiry')) {
                        const expiredCount = medicines.filter(med => new Date(med.expiryDate) <= new Date()).length;
                        botResponse = `You have ${expiredCount} expired medicines. Would you like me to show you the expired medicines page?`;
                    } else if (input.includes('patient') || input.includes('patients')) {
                        botResponse = `You have ${patients.length} patients registered. You can manage them in the Patients section.`;
                    } else if (input.includes('medicine') || input.includes('inventory')) {
                        const lowStock = medicines.filter(med => med.quantity <= 10).length;
                        botResponse = `You have ${medicines.length} medicines in inventory. ${lowStock} items are running low on stock.`;
                    } else if (input.includes('hello') || input.includes('hi')) {
                        botResponse = 'Hello! I can help you with information about medicines, patients, expired items, and more. What would you like to know?';
                    } else {
                        botResponse = 'I can help you with medicines, patients, expired items, inventory, and prescriptions. What specific information do you need?';
                    }

                    const botMessage = { id: Date.now() + 1, text: botResponse, sender: 'bot' };
                    setMessages(prev => [...prev, botMessage]);
                }, 1000);

                setInputMessage('');
            };

            return (
                <div className="flex flex-col h-full">
                    <div className="p-4 border-b border-white/10">
                        <h3 className="font-semibold">AI Assistant</h3>
                    </div>
                    
                    <div className="flex-1 p-4 overflow-y-auto space-y-3">
                        {messages.map(message => (
                            <div key={message.id} className={`flex ${message.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[80%] p-3 rounded-lg ${
                                    message.sender === 'user' 
                                        ? 'bg-blue-600 text-white' 
                                        : (darkMode ? 'bg-blue-900/50' : 'bg-white/50')
                                }`}>
                                    <p className="text-sm">{message.text}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <form onSubmit={handleSendMessage} className="p-4 border-t border-white/10">
                        <div className="flex space-x-2">
                            <input
                                type="text"
                                value={inputMessage}
                                onChange={(e) => setInputMessage(e.target.value)}
                                placeholder="Ask me anything..."
                                className={`flex-1 px-3 py-2 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                            />
                            <button
                                type="submit"
                                className="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 transition-colors"
                            >
                                <i data-lucide="send" className="w-4 h-4"></i>
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isSignUp, setIsSignUp] = useState(false);
            const [darkMode, setDarkMode] = useState(false);
            const [currentPage, setCurrentPage] = useState('dashboard');

            const handleLogin = (userData) => {
                setIsAuthenticated(true);
            };

            if (!isAuthenticated) {
                return (
                    <AuthPage 
                        onLogin={handleLogin} 
                        isSignUp={isSignUp} 
                        setIsSignUp={setIsSignUp} 
                    />
                );
            }

            return (
                <Dashboard 
                    darkMode={darkMode} 
                    setDarkMode={setDarkMode}
                    currentPage={currentPage}
                    setCurrentPage={setCurrentPage}
                    setIsAuthenticated={setIsAuthenticated}
                />
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
