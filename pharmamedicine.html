<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaFlow - Pharmaceutical Management System</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Charts are rendered with pure CSS - no external chart library needed -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .glassmorphism {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .dark-glassmorphism {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .gradient-bg {
            background: #0f172a;
            background-image: radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08), transparent 25%), radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.08), transparent 25%);
        }

        .light-gradient {
            background: #f8fafc;
            background-image: radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%), radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.05), transparent 25%);
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(0);
            }
        }

        .hover-scale {
            transition: transform 0.2s ease-in-out;
        }

        .hover-scale:hover {
            transform: scale(1.02);
        }

        .chatbot-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Error Boundary for Debugging ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("ErrorBoundary caught an error:", error, errorInfo);
                this.setState({ errorInfo });
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '20px', backgroundColor: '#fee2e2', color: '#991b1b', borderRadius: '8px', margin: '20px' }}>
                            <h2 style={{ fontSize: '20px', fontWeight: 'bold' }}>Something went wrong.</h2>
                            <details style={{ whiteSpace: 'pre-wrap', marginTop: '10px' }}>
                                <summary style={{ cursor: 'pointer', fontWeight: 'bold' }}>Click for Error Details</summary>
                                <br />
                                {this.state.error && this.state.error.toString()}
                                <br />
                                {this.state.errorInfo && this.state.errorInfo.componentStack}
                            </details>
                        </div>
                    );
                }
                return this.props.children;
            }
        }
        // ------------------------------------

        // Mock Data
        const mockMedicines = [
            { id: 1, name: 'Paracetamol 500mg', category: 'Pain Relief', quantity: 150, price: 25, currency: 'INR', expiryDate: '2024-12-15', batchNumber: 'PCM001', supplier: 'Cipla Ltd' },
            { id: 2, name: 'Amoxicillin 250mg', category: 'Antibiotic', quantity: 75, price: 180, currency: 'INR', expiryDate: '2024-06-20', batchNumber: 'AMX002', supplier: 'Sun Pharma' },
            { id: 3, name: 'Cetirizine 10mg', category: 'Antihistamine', quantity: 200, price: 45, currency: 'INR', expiryDate: '2025-03-10', batchNumber: 'CTZ003', supplier: 'Dr. Reddy\'s' },
            { id: 4, name: 'Metformin 500mg', category: 'Diabetes', quantity: 5, price: 120, currency: 'INR', expiryDate: '2024-01-15', batchNumber: 'MET004', supplier: 'Lupin Ltd' }
        ];

        const mockPatients = [
            { id: 1, name: 'Rajesh Kumar', age: 45, phone: '+91-9876543210', email: 'rajesh.kumar@email.com', address: 'Mumbai, Maharashtra', medicalHistory: 'Diabetes, Hypertension' },
            { id: 2, name: 'Priya Sharma', age: 32, phone: '+91-8765432109', email: 'priya.sharma@email.com', address: 'Delhi, NCR', medicalHistory: 'Asthma' },
            { id: 3, name: 'Amit Patel', age: 28, phone: '+91-7654321098', email: 'amit.patel@email.com', address: 'Ahmedabad, Gujarat', medicalHistory: 'None' }
        ];

        const mockSuppliers = [
            { id: 1, name: 'Cipla Ltd', contact: '+91-22-2482-1234', email: 'orders@cipla.com', company: 'Cipla Limited', medicines: ['Paracetamol', 'Aspirin', 'Ibuprofen'] },
            { id: 2, name: 'Sun Pharma', contact: '+91-22-4324-4324', email: 'supply@sunpharma.com', company: 'Sun Pharmaceutical Industries Ltd', medicines: ['Amoxicillin', 'Azithromycin'] },
            { id: 3, name: 'Dr. Reddy\'s', contact: '+91-40-4900-2900', email: 'orders@drreddys.com', company: 'Dr. Reddy\'s Laboratories Ltd', medicines: ['Cetirizine', 'Loratadine'] }
        ];

        const currencies = [
            { code: 'INR', symbol: '₹', name: 'Indian Rupee' },
            { code: 'USD', symbol: '$', name: 'US Dollar' },
            { code: 'EUR', symbol: '€', name: 'Euro' },
            { code: 'GBP', symbol: '£', name: 'British Pound' },
            { code: 'JPY', symbol: '¥', name: 'Japanese Yen' }
        ];

        // API Configuration & Wrapper
        const API_BASE_URL = 'http://localhost:3001/api';
        let authToken = localStorage.getItem('pharmaflow_token') || null;

        const apiCall = async (endpoint, options = {}) => {
            const headers = {
                'Content-Type': 'application/json',
                ...(authToken && { 'Authorization': `Bearer ${authToken}` }),
                ...options.headers
            };

            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, { ...options, headers });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'API request failed');
                return data;
            } catch (err) {
                console.error("API Call Error:", err);
                throw err;
            }
        };

        const authAPI = {
            register: async (email, password, name) => {
                const data = await apiCall('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ email, password, name, role: 'staff' })
                });
                authToken = data.token;
                localStorage.setItem('pharmaflow_token', data.token);
                return data;
            },
            login: async (email, password) => {
                const data = await apiCall('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                authToken = data.token;
                localStorage.setItem('pharmaflow_token', data.token);
                return data;
            },
            logout: () => {
                authToken = null;
                localStorage.removeItem('pharmaflow_token');
            }
        };

        const medicinesAPI = {
            getAll: () => apiCall('/medicines'),
            getExpiring: () => apiCall('/medicines/expiring'),
            getExpired: () => apiCall('/medicines/expired'),
            getLowStock: () => apiCall('/medicines/low-stock'),
        };

        const patientsAPI = {
            getAll: () => apiCall('/patients')
        };

        const suppliersAPI = {
            getAll: () => apiCall('/suppliers')
        };

        const AuthPage = ({ onLogin, isSignUp, setIsSignUp }) => {
            const [formData, setFormData] = useState({ email: '', password: '', name: '', rememberMe: false });
            const [showPassword, setShowPassword] = useState(false);
            const [errors, setErrors] = useState({});

            const validateForm = () => {
                const newErrors = {};
                if (!formData.email) newErrors.email = 'Email is required';
                if (!formData.password) newErrors.password = 'Password is required';
                if (isSignUp && !formData.name) newErrors.name = 'Name is required';
                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (validateForm()) {
                    try {
                        let res;
                        if (isSignUp) {
                            res = await authAPI.register(formData.email, formData.password, formData.name);
                        } else {
                            res = await authAPI.login(formData.email, formData.password);
                        }
                        onLogin(res.user);
                    } catch (error) {
                        setErrors({ global: error.message || 'Authentication failed' });
                    }
                }
            };

            return (
                <div className="flex min-h-screen bg-gray-900 overflow-hidden font-sans">
                    {/* Left Panel: Glowing Crystal Glassmorphism */}
                    <div className="hidden lg:flex lg:w-1/2 relative flex-col justify-center items-center p-12 overflow-hidden">
                        {/* Abstract animated background elements */}
                        <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-500/30 rounded-full blur-[120px] mix-blend-screen animate-blob"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-indigo-500/20 rounded-full blur-[120px] mix-blend-screen animate-blob animation-delay-2000"></div>
                        <div className="absolute top-[40%] right-[20%] w-[40%] h-[40%] bg-cyan-400/20 rounded-full blur-[100px] mix-blend-screen animate-blob animation-delay-4000"></div>

                        <div className="relative z-10 max-w-lg w-full backdrop-blur-3xl bg-white/5 border border-white/10 p-10 rounded-3xl shadow-[0_0_40px_rgba(59,130,246,0.15)] overflow-hidden">
                            <div className="absolute inset-0 bg-gradient-to-br from-white/10 via-transparent to-transparent opacity-50"></div>
                            <div className="absolute inset-0 border-[0.5px] border-white/20 rounded-3xl [mask-image:linear-gradient(to_bottom_right,white,transparent)]"></div>

                            <div className="relative z-20 flex items-center space-x-4 mb-10">
                                <div className="w-16 h-16 bg-gradient-to-br from-blue-400 to-indigo-600 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(59,130,246,0.5)]">
                                    <i data-lucide="pill" className="w-8 h-8 text-white"></i>
                                </div>
                                <h1 className="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-100 to-indigo-200 tracking-tight">MEDIMETRICS</h1>
                            </div>

                            <div className="relative z-20 space-y-6">
                                <h2 className="text-5xl font-extrabold text-white leading-tight">
                                    Intelligent <br />
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 drop-shadow-sm">Pharmacy</span> <br />
                                    Management.
                                </h2>
                                <p className="text-lg text-blue-100/70 font-light leading-relaxed">
                                    Unify your inventory, track patients effortlessly, and predict stock shortages with our next-generation neural nervous system architecture.
                                </p>

                                <div className="pt-8 flex space-x-6">
                                    <div className="flex flex-col">
                                        <span className="text-3xl font-bold text-white">99%</span>
                                        <span className="text-sm font-medium text-blue-200/60 uppercase tracking-wider">Uptime</span>
                                    </div>
                                    <div className="h-12 w-px bg-white/20"></div>
                                    <div className="flex flex-col">
                                        <span className="text-3xl font-bold text-white">10x</span>
                                        <span className="text-sm font-medium text-blue-200/60 uppercase tracking-wider">Faster Docs</span>
                                    </div>
                                    <div className="h-12 w-px bg-white/20"></div>
                                    <div className="flex flex-col">
                                        <span className="text-3xl font-bold text-white">Zero</span>
                                        <span className="text-sm font-medium text-blue-200/60 uppercase tracking-wider">Stockouts</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Right Panel: Form Area */}
                    <div className="w-full lg:w-1/2 flex flex-col justify-center items-center bg-white px-6 py-12 lg:px-20 z-10 shadow-[-20px_0_50px_-20px_rgba(0,0,0,0.5)] relative">
                        {/* Mobile Logo */}
                        <div className="flex lg:hidden items-center justify-center mb-10 w-full animate-fade-in">
                            <div className="w-12 h-12 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center shadow-lg mr-3">
                                <i data-lucide="pill" className="w-6 h-6 text-white"></i>
                            </div>
                            <h1 className="text-3xl font-bold text-gray-900">MEDIMETRICS</h1>
                        </div>

                        <div className="max-w-md w-full animate-fade-in">
                            <div className="mb-10 text-center lg:text-left">
                                <h2 className="text-3xl font-bold text-gray-900 mb-3 tracking-tight">{isSignUp ? 'Create your account' : 'Welcome back'}</h2>
                                <p className="text-gray-500 font-medium">{isSignUp ? 'Sign up to modernize your pharma business today.' : 'Please enter your details to access your dashboard.'}</p>
                                {errors.global && (
                                    <div className="mt-4 p-4 rounded-xl bg-red-50 border border-red-100 flex items-start space-x-3 animate-slide-in">
                                        <i data-lucide="alert-circle" className="w-5 h-5 text-red-500 shrink-0 mt-0.5"></i>
                                        <p className="text-sm text-red-600 font-medium text-left">{errors.global}</p>
                                    </div>
                                )}
                            </div>

                            <form onSubmit={handleSubmit} className="space-y-5">
                                {isSignUp && (
                                    <div className="animate-slide-in">
                                        <label htmlFor="name" className="block text-sm font-semibold text-gray-700 mb-1.5">Full Name</label>
                                        <div className="relative">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                <i data-lucide="user" className="h-5 w-5 text-gray-400"></i>
                                            </div>
                                            <input
                                                id="name"
                                                type="text"
                                                value={formData.name}
                                                onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                                className="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all bg-gray-50 focus:bg-white sm:text-sm font-medium text-gray-900"
                                                placeholder="Dr. John Doe"
                                            />
                                        </div>
                                        {errors.name && <p className="text-red-500 text-xs font-semibold mt-1.5 pl-1">{errors.name}</p>}
                                    </div>
                                )}

                                <div>
                                    <label htmlFor="email" className="block text-sm font-semibold text-gray-700 mb-1.5">Email Address</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <i data-lucide="mail" className="h-5 w-5 text-gray-400"></i>
                                        </div>
                                        <input
                                            id="email"
                                            type="email"
                                            value={formData.email}
                                            onChange={(e) => setFormData({ ...formData, email: e.target.value })}
                                            className="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all bg-gray-50 focus:bg-white sm:text-sm font-medium text-gray-900"
                                            placeholder="you@hospital.com"
                                        />
                                    </div>
                                    {errors.email && <p className="text-red-500 text-xs font-semibold mt-1.5 pl-1">{errors.email}</p>}
                                </div>

                                <div>
                                    <label htmlFor="password" className="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <i data-lucide="lock" className="h-5 w-5 text-gray-400"></i>
                                        </div>
                                        <input
                                            id="password"
                                            type={showPassword ? 'text' : 'password'}
                                            value={formData.password}
                                            onChange={(e) => setFormData({ ...formData, password: e.target.value })}
                                            className="w-full pl-11 pr-12 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all bg-gray-50 focus:bg-white sm:text-sm font-medium text-gray-900"
                                            placeholder="••••••••"
                                        />
                                        <button
                                            type="button"
                                            onClick={() => setShowPassword(!showPassword)}
                                            className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 transition-colors"
                                        >
                                            <i data-lucide={showPassword ? 'eye-off' : 'eye'} className="h-5 w-5"></i>
                                        </button>
                                    </div>
                                    {errors.password && <p className="text-red-500 text-xs font-semibold mt-1.5 pl-1">{errors.password}</p>}
                                </div>

                                {!isSignUp && (
                                    <div className="flex items-center justify-between pt-1">
                                        <label className="flex items-center group cursor-pointer">
                                            <input
                                                type="checkbox"
                                                checked={formData.rememberMe}
                                                onChange={(e) => setFormData({ ...formData, rememberMe: e.target.checked })}
                                                className="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500/50 cursor-pointer"
                                            />
                                            <span className="ml-2.5 text-sm font-medium text-gray-600 group-hover:text-gray-900 transition-colors">Remember me for 30 days</span>
                                        </label>
                                        <a href="#" className="text-sm font-semibold text-blue-600 hover:text-blue-700 transition-colors">Forgot password?</a>
                                    </div>
                                )}

                                <div className="pt-2">
                                    <button
                                        type="submit"
                                        className="w-full flex items-center justify-center space-x-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white py-3.5 px-4 rounded-xl focus:ring-4 focus:ring-blue-500/30 transition-all font-semibold shadow-lg shadow-blue-600/20 active:scale-[0.98]"
                                    >
                                        <span>{isSignUp ? 'Create new account' : 'Sign in to dashboard'}</span>
                                        <i data-lucide="arrow-right" className="w-5 h-5"></i>
                                    </button>
                                </div>
                            </form>

                            <div className="mt-10 pt-8 border-t border-gray-100 text-center">
                                <p className="text-sm font-medium text-gray-600">
                                    {isSignUp ? 'Already have an account?' : "New to PharmaFlow?"}
                                    <button
                                        onClick={() => { setIsSignUp(!isSignUp); setErrors({}); }}
                                        className="ml-2 text-blue-600 hover:text-blue-800 font-bold transition-colors"
                                    >
                                        {isSignUp ? 'Sign in instead' : 'Create an account'}
                                    </button>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Dashboard Component
        const Dashboard = ({ darkMode, setDarkMode, currentPage, setCurrentPage, setIsAuthenticated }) => {
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [chatbotOpen, setChatbotOpen] = useState(false);
            const [medicines, setMedicines] = useState([]);
            const [patients, setPatients] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [showSearchResults, setShowSearchResults] = useState(false);
            const [showNotifications, setShowNotifications] = useState(false);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const [medsData, patsData, suppsData] = await Promise.all([
                            medicinesAPI.getAll(),
                            patientsAPI.getAll(),
                            suppliersAPI.getAll()
                        ]);
                        setMedicines(medsData);
                        setPatients(patsData);
                        setSuppliers(suppsData);
                    } catch (error) {
                        console.error('Failed to fetch data from backend, falling back to mock data', error);
                        setMedicines(mockMedicines);
                        setPatients(mockPatients);
                        setSuppliers(mockSuppliers);
                    } finally {
                        setIsLoading(false);
                    }
                };
                loadData();
            }, []);

            const menuItems = [
                { id: 'dashboard', name: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'inventory', name: 'Inventory Management', icon: 'pill' },
                { id: 'expired', name: 'Expired Medicines', icon: 'clock' },
                { id: 'patients', name: 'Patients', icon: 'users' },
                { id: 'prescriptions', name: 'Prescriptions', icon: 'file-text' },
                { id: 'suppliers', name: 'Suppliers', icon: 'truck' },
                { id: 'settings', name: 'Settings', icon: 'settings' }
            ];

            const getExpiredMedicines = () => {
                const today = new Date();
                return medicines.filter(med => {
                    const expiryDate = new Date(med.expiryDate);
                    const daysUntilExpiry = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
                    return daysUntilExpiry <= 30;
                });
            };

            const getLowStockMedicines = () => {
                return medicines.filter(med => med.quantity <= 10);
            };

            // Calculate notification counts
            const today = new Date();
            const expiredCount = medicines.filter(med => new Date(med.expiryDate) <= today).length;
            const nearExpiryCount = medicines.filter(med => {
                const expiryDate = new Date(med.expiryDate);
                const daysUntilExpiry = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
                return daysUntilExpiry > 0 && daysUntilExpiry <= 30;
            }).length;
            const lowStockCount = medicines.filter(med => med.quantity <= 10).length;

            // Search functionality
            useEffect(() => {
                if (searchTerm.trim()) {
                    const results = [];

                    // Search medicines
                    medicines.forEach(med => {
                        if (med.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                            med.category.toLowerCase().includes(searchTerm.toLowerCase()) ||
                            med.supplier.toLowerCase().includes(searchTerm.toLowerCase())) {
                            results.push({
                                type: 'medicine',
                                id: med.id,
                                title: med.name,
                                subtitle: `${med.category} • Qty: ${med.quantity}`,
                                icon: 'pill',
                                action: () => setCurrentPage('inventory')
                            });
                        }
                    });

                    // Search patients
                    patients.forEach(patient => {
                        if (patient.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                            patient.phone.includes(searchTerm) ||
                            patient.email.toLowerCase().includes(searchTerm.toLowerCase())) {
                            results.push({
                                type: 'patient',
                                id: patient.id,
                                title: patient.name,
                                subtitle: `Age: ${patient.age} • ${patient.phone}`,
                                icon: 'user',
                                action: () => setCurrentPage('patients')
                            });
                        }
                    });

                    // Search suppliers
                    suppliers.forEach(supplier => {
                        if (supplier.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                            supplier.company.toLowerCase().includes(searchTerm.toLowerCase())) {
                            results.push({
                                type: 'supplier',
                                id: supplier.id,
                                title: supplier.name,
                                subtitle: supplier.company,
                                icon: 'truck',
                                action: () => setCurrentPage('suppliers')
                            });
                        }
                    });

                    // Add general suggestions
                    if (searchTerm.toLowerCase().includes('prescription')) {
                        results.push({
                            type: 'action',
                            id: 'prescription',
                            title: 'Create Prescription',
                            subtitle: 'Create a new prescription for patients',
                            icon: 'file-text',
                            action: () => setCurrentPage('prescriptions')
                        });
                    }

                    if (searchTerm.toLowerCase().includes('expired')) {
                        results.push({
                            type: 'action',
                            id: 'expired',
                            title: 'View Expired Medicines',
                            subtitle: 'Check medicines that have expired',
                            icon: 'clock',
                            action: () => setCurrentPage('expired')
                        });
                    }

                    setSearchResults(results.slice(0, 8)); // Limit to 8 results
                    setShowSearchResults(true);
                } else {
                    setSearchResults([]);
                    setShowSearchResults(false);
                }
            }, [searchTerm, medicines, patients, suppliers]);

            useEffect(() => {
                lucide.createIcons();
            }, [currentPage, darkMode]);

            const renderContent = () => {
                switch (currentPage) {
                    case 'dashboard':
                        return <DashboardHome medicines={medicines} patients={patients} suppliers={suppliers} darkMode={darkMode} setCurrentPage={setCurrentPage} />;
                    case 'inventory':
                        return <InventoryManagement medicines={medicines} setMedicines={setMedicines} darkMode={darkMode} searchTerm={searchTerm} />;
                    case 'expired':
                        return <ExpiredMedicines medicines={getExpiredMedicines()} darkMode={darkMode} />;
                    case 'patients':
                        return <PatientManagement patients={patients} setPatients={setPatients} darkMode={darkMode} searchTerm={searchTerm} />;
                    case 'prescriptions':
                        return <PrescriptionManagement patients={patients} medicines={medicines} darkMode={darkMode} />;
                    case 'suppliers':
                        return <SupplierManagement suppliers={suppliers} setSuppliers={setSuppliers} darkMode={darkMode} searchTerm={searchTerm} />;
                    case 'settings':
                        return <Settings darkMode={darkMode} setDarkMode={setDarkMode} />;
                    default:
                        return <DashboardHome medicines={medicines} patients={patients} suppliers={suppliers} darkMode={darkMode} setCurrentPage={setCurrentPage} />;
                }
            };

            return (
                <div className={`min-h-screen ${darkMode ? 'gradient-bg text-white' : 'light-gradient text-gray-900'} transition-all duration-300`}>
                    {/* Sidebar */}
                    <div
                        onMouseEnter={() => setSidebarOpen(true)}
                        onMouseLeave={() => setSidebarOpen(false)}
                        className={`fixed left-0 top-0 h-full ${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} border-r-0 transform transition-all duration-300 z-40 flex flex-col overflow-hidden shadow-2xl ${sidebarOpen ? 'w-64 translate-x-0' : 'w-20 translate-x-0'}`}
                        style={{ borderRight: darkMode ? '1px solid rgba(255,255,255,0.05)' : '1px solid rgba(0,0,0,0.05)' }}
                    >
                        <div className={`p-4 mt-2 flex items-center h-16 transition-all duration-300 ${sidebarOpen ? 'justify-start px-6' : 'justify-center'}`}>
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shrink-0 shadow-lg shadow-blue-500/30">
                                <i data-lucide="pill" className="w-6 h-6 text-white" style={{ strokeWidth: 2 }}></i>
                            </div>
                            <h1 className={`text-2xl font-bold ml-4 whitespace-nowrap transition-all duration-300 tracking-tight ${sidebarOpen ? 'opacity-100 translate-x-0' : 'opacity-0 -translate-x-4 hidden'}`}>
                                PharmaFlow
                            </h1>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-8">
                            {menuItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setCurrentPage(item.id)}
                                    className={`w-full flex items-center h-12 rounded-xl transition-all relative group/nav overflow-hidden ${currentPage === item.id
                                        ? (darkMode ? 'bg-blue-600/20 text-blue-400 font-semibold' : 'bg-blue-50 text-blue-600 font-semibold')
                                        : (darkMode ? 'text-gray-400 hover:bg-white/5 hover:text-white' : 'text-gray-500 hover:bg-black/5 hover:text-gray-900')
                                        } ${sidebarOpen ? 'px-4' : 'px-0 justify-center'}`}
                                    title={!sidebarOpen ? item.name : ''}
                                >
                                    <div className={`flex items-center justify-center shrink-0 ${sidebarOpen ? '' : 'w-12 h-12'}`}>
                                        <i data-lucide={item.icon} className={`w-5 h-5 transition-transform group-hover/nav:scale-110 ${currentPage === item.id ? 'stroke-[2.5px]' : 'stroke-2'}`}></i>
                                    </div>
                                    <span className={`whitespace-nowrap ml-3 transition-opacity duration-300 ${sidebarOpen ? 'opacity-100 block' : 'opacity-0 hidden'}`}>
                                        {item.name}
                                    </span>
                                </button>
                            ))}
                        </nav>

                        <div className={`p-4 mt-auto mb-4 transition-all duration-300 ${sidebarOpen ? 'px-4' : 'px-2'}`}>
                            <div className={`flex items-center p-2 rounded-xl ${darkMode ? 'hover:bg-white/5' : 'hover:bg-black/5'} transition-colors cursor-pointer ${sidebarOpen ? 'justify-start' : 'justify-center'}`}>
                                <div className="w-10 h-10 bg-gradient-to-br from-blue-100 to-indigo-100 dark:from-blue-900 dark:to-indigo-900 rounded-full flex items-center justify-center shrink-0 border border-blue-200 dark:border-blue-700">
                                    <span className="text-blue-700 dark:text-blue-300 font-bold text-sm">A</span>
                                </div>
                                <div className={`ml-3 overflow-hidden transition-all duration-300 ${sidebarOpen ? 'opacity-100 w-auto' : 'opacity-0 w-0 hidden'}`}>
                                    <p className="text-sm font-semibold truncate leading-tight">Admin User</p>
                                    <p className="text-xs text-blue-500 dark:text-blue-400 truncate">admin@pharmaflow</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="transition-all duration-300 pl-20 w-full min-h-screen flex flex-col">
                        {/* Top Navigation */}
                        <header className={`${darkMode ? 'dark-glassmorphism border-white/5' : 'glassmorphism border-black/5'} border-b px-6 py-4 flex items-center justify-between sticky top-0 z-30 shadow-sm`}>
                            <div className="flex items-center space-x-4">
                                <div className="relative">
                                    <input
                                        type="text"
                                        placeholder="Search medicines, patients, suppliers..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        onFocus={() => setShowSearchResults(searchTerm.trim() !== '')}
                                        onBlur={() => setTimeout(() => setShowSearchResults(false), 200)}
                                        className={`pl-10 pr-4 py-2 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white placeholder-blue-200' : 'bg-white/50 text-gray-900 placeholder-gray-500'} focus:ring-2 focus:ring-blue-500 transition-all w-80`}
                                    />
                                    <i data-lucide="search" className="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>

                                    {/* Search Results Dropdown */}
                                    {showSearchResults && searchResults.length > 0 && (
                                        <div className={`absolute top-full left-0 right-0 mt-2 ${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-lg shadow-xl z-50 max-h-96 overflow-y-auto`}>
                                            <div className="p-2">
                                                <p className={`text-xs font-medium ${darkMode ? 'text-blue-200' : 'text-gray-600'} px-3 py-2`}>
                                                    Search Results ({searchResults.length})
                                                </p>
                                                {searchResults.map((result) => (
                                                    <button
                                                        key={`${result.type}-${result.id}`}
                                                        onClick={() => {
                                                            result.action();
                                                            setShowSearchResults(false);
                                                            setSearchTerm('');
                                                        }}
                                                        className={`w-full flex items-center space-x-3 px-3 py-3 rounded-lg hover:bg-white/10 transition-colors text-left`}
                                                    >
                                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${result.type === 'medicine' ? 'bg-blue-100' :
                                                            result.type === 'patient' ? 'bg-green-100' :
                                                                result.type === 'supplier' ? 'bg-purple-100' :
                                                                    'bg-orange-100'
                                                            }`}>
                                                            <i data-lucide={result.icon} className={`w-4 h-4 ${result.type === 'medicine' ? 'text-blue-600' :
                                                                result.type === 'patient' ? 'text-green-600' :
                                                                    result.type === 'supplier' ? 'text-purple-600' :
                                                                        'text-orange-600'
                                                                }`}></i>
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <p className="font-medium text-sm truncate">{result.title}</p>
                                                            <p className={`text-xs ${darkMode ? 'text-blue-200' : 'text-gray-600'} truncate`}>
                                                                {result.subtitle}
                                                            </p>
                                                        </div>
                                                        <span className={`px-2 py-1 rounded-full text-xs ${result.type === 'medicine' ? 'bg-blue-100 text-blue-800' :
                                                            result.type === 'patient' ? 'bg-green-100 text-green-800' :
                                                                result.type === 'supplier' ? 'bg-purple-100 text-purple-800' :
                                                                    'bg-orange-100 text-orange-800'
                                                            }`}>
                                                            {result.type}
                                                        </span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* No Results */}
                                    {showSearchResults && searchResults.length === 0 && searchTerm.trim() && (
                                        <div className={`absolute top-full left-0 right-0 mt-2 ${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-lg shadow-xl z-50`}>
                                            <div className="p-4 text-center">
                                                <i data-lucide="search-x" className="w-8 h-8 mx-auto mb-2 text-gray-400"></i>
                                                <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                                    No results found for "{searchTerm}"
                                                </p>
                                                <p className={`text-xs ${darkMode ? 'text-blue-300' : 'text-gray-500'} mt-1`}>
                                                    Try searching for medicines, patients, or suppliers
                                                </p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="flex items-center space-x-4">
                                <button
                                    onClick={() => setDarkMode(!darkMode)}
                                    className="p-2 rounded-lg hover:bg-white/20 transition-colors"
                                    title={darkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'}
                                >
                                    <i data-lucide={darkMode ? 'sun' : 'moon'} className="w-6 h-6"></i>
                                </button>
                                <div className="relative">
                                    <button
                                        onClick={() => setShowNotifications(!showNotifications)}
                                        className="p-2 rounded-lg hover:bg-white/20 transition-colors relative"
                                    >
                                        <i data-lucide="bell" className="w-6 h-6"></i>
                                        {(expiredCount + nearExpiryCount + lowStockCount) > 0 && (
                                            <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
                                                {expiredCount + nearExpiryCount + lowStockCount}
                                            </span>
                                        )}
                                    </button>

                                    {/* Notifications Dropdown */}
                                    {showNotifications && (
                                        <div className={`absolute top-full right-0 mt-2 w-80 ${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-lg shadow-xl z-50 max-h-96 overflow-y-auto`}>
                                            <div className="p-4 border-b border-white/10">
                                                <h3 className="font-semibold">Notifications</h3>
                                                <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                                    {expiredCount + nearExpiryCount + lowStockCount} alerts
                                                </p>
                                            </div>
                                            <div className="p-2 space-y-2">
                                                {expiredCount > 0 && (
                                                    <button
                                                        onClick={() => {
                                                            setCurrentPage('expired');
                                                            setShowNotifications(false);
                                                        }}
                                                        className="w-full p-3 rounded-lg bg-red-100/20 border border-red-200/30 hover:bg-red-100/30 transition-colors text-left"
                                                    >
                                                        <div className="flex items-center space-x-3">
                                                            <div className="w-8 h-8 bg-red-100 rounded-lg flex items-center justify-center">
                                                                <i data-lucide="alert-circle" className="w-4 h-4 text-red-600"></i>
                                                            </div>
                                                            <div className="flex-1">
                                                                <p className="font-medium text-sm text-red-600">Expired Medicines</p>
                                                                <p className="text-xs text-red-500">{expiredCount} medicines have expired</p>
                                                            </div>
                                                        </div>
                                                    </button>
                                                )}

                                                {nearExpiryCount > 0 && (
                                                    <button
                                                        onClick={() => {
                                                            setCurrentPage('expired');
                                                            setShowNotifications(false);
                                                        }}
                                                        className="w-full p-3 rounded-lg bg-yellow-100/20 border border-yellow-200/30 hover:bg-yellow-100/30 transition-colors text-left"
                                                    >
                                                        <div className="flex items-center space-x-3">
                                                            <div className="w-8 h-8 bg-yellow-100 rounded-lg flex items-center justify-center">
                                                                <i data-lucide="clock" className="w-4 h-4 text-yellow-600"></i>
                                                            </div>
                                                            <div className="flex-1">
                                                                <p className="font-medium text-sm text-yellow-600">Near Expiry</p>
                                                                <p className="text-xs text-yellow-500">{nearExpiryCount} medicines expiring within 30 days</p>
                                                            </div>
                                                        </div>
                                                    </button>
                                                )}

                                                {lowStockCount > 0 && (
                                                    <button
                                                        onClick={() => {
                                                            setCurrentPage('inventory');
                                                            setShowNotifications(false);
                                                        }}
                                                        className="w-full p-3 rounded-lg bg-orange-100/20 border border-orange-200/30 hover:bg-orange-100/30 transition-colors text-left"
                                                    >
                                                        <div className="flex items-center space-x-3">
                                                            <div className="w-8 h-8 bg-orange-100 rounded-lg flex items-center justify-center">
                                                                <i data-lucide="alert-triangle" className="w-4 h-4 text-orange-600"></i>
                                                            </div>
                                                            <div className="flex-1">
                                                                <p className="font-medium text-sm text-orange-600">Low Stock Alert</p>
                                                                <p className="text-xs text-orange-500">{lowStockCount} items are running low</p>
                                                            </div>
                                                        </div>
                                                    </button>
                                                )}

                                                {(expiredCount + nearExpiryCount + lowStockCount) === 0 && (
                                                    <div className="p-4 text-center">
                                                        <i data-lucide="check-circle" className="w-8 h-8 mx-auto mb-2 text-green-500"></i>
                                                        <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                                            No notifications
                                                        </p>
                                                        <p className={`text-xs ${darkMode ? 'text-blue-300' : 'text-gray-500'} mt-1`}>
                                                            All systems are running smoothly
                                                        </p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <button
                                    onClick={() => setIsAuthenticated(false)}
                                    className="p-2 rounded-lg hover:bg-white/20 transition-colors"
                                    title="Logout"
                                >
                                    <i data-lucide="log-out" className="w-6 h-6"></i>
                                </button>
                                <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">
                                    <span className="text-white font-medium">A</span>
                                </div>
                            </div>
                        </header>

                        {/* Page Content */}
                        <main className="p-6 animate-fade-in">
                            {renderContent()}
                        </main>
                    </div>

                    {/* Chatbot */}
                    <div className="fixed bottom-6 right-6 z-50">
                        <button
                            onClick={() => setChatbotOpen(!chatbotOpen)}
                            className={`w-14 h-14 rounded-full ${darkMode ? 'bg-blue-600' : 'bg-blue-500'} text-white shadow-lg hover:shadow-xl transition-all chatbot-float`}
                        >
                            <i data-lucide="message-circle" className="w-6 h-6 mx-auto"></i>
                        </button>

                        {chatbotOpen && (
                            <div className={`absolute bottom-16 right-0 w-80 h-96 ${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl shadow-xl animate-slide-in`}>
                                <Chatbot darkMode={darkMode} medicines={medicines} patients={patients} />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Dashboard Home Component
        const DashboardHome = ({ medicines, patients, suppliers, darkMode, setCurrentPage }) => {
            const expiredCount = medicines.filter(med => new Date(med.expiryDate) <= new Date()).length;
            const lowStockCount = medicines.filter(med => med.quantity <= 10).length;
            const totalRevenue = medicines.reduce((sum, med) => sum + (med.price * med.quantity), 0);
            const nearExpiryCount = medicines.filter(med => {
                const expiryDate = new Date(med.expiryDate);
                const today = new Date();
                const daysUntilExpiry = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
                return daysUntilExpiry > 0 && daysUntilExpiry <= 30;
            }).length;

            const stats = [
                { title: 'Total Medicines', value: medicines.length, icon: 'pill', color: 'blue', trend: '+12%', trendUp: true },
                { title: 'Total Revenue', value: `₹${totalRevenue.toLocaleString()}`, icon: 'trending-up', color: 'green', trend: '+8.2%', trendUp: true },
                { title: 'Total Patients', value: patients.length, icon: 'users', color: 'purple', trend: '+5.1%', trendUp: true },
                { title: 'Low Stock Alert', value: lowStockCount, icon: 'alert-triangle', color: 'red', trend: '-2.3%', trendUp: false }
            ];

            const quickActions = [
                { title: 'Add Medicine', icon: 'plus-circle', color: 'blue', action: 'inventory' },
                { title: 'New Patient', icon: 'user-plus', color: 'green', action: 'patients' },
                { title: 'Create Prescription', icon: 'file-plus', color: 'purple', action: 'prescriptions' },
                { title: 'View Reports', icon: 'bar-chart-3', color: 'orange', action: 'expired' }
            ];

            // --- Chart Data Preparation (Pure CSS Charts) ---
            // 1. Inventory Value by Category Data
            const categoryDataMap = medicines.reduce((acc, med) => {
                const cat = med.category || 'Uncategorized';
                acc[cat] = (acc[cat] || 0) + (med.price * med.quantity);
                return acc;
            }, {});
            const categoryData = Object.keys(categoryDataMap).map(cat => ({
                name: cat,
                value: categoryDataMap[cat]
            })).sort((a, b) => b.value - a.value).slice(0, 5);
            const maxCategoryValue = Math.max(...categoryData.map(d => d.value), 1);

            // 2. Medicine Expiry Timeline Data (Gantt style)
            const expiryData = [...medicines]
                .filter(med => new Date(med.expiryDate) > new Date())
                .sort((a, b) => new Date(a.expiryDate) - new Date(b.expiryDate))
                .slice(0, 6)
                .map(med => {
                    const expiry = new Date(med.expiryDate);
                    const today = new Date();
                    const daysRemaining = Math.max(0, Math.ceil((expiry - today) / (1000 * 60 * 60 * 24)));
                    return {
                        name: med.name.length > 15 ? med.name.substring(0, 15) + '...' : med.name,
                        days: daysRemaining,
                        fullDate: new Date(med.expiryDate).toLocaleDateString('en-IN')
                    };
                });
            const maxExpiryDays = Math.max(...expiryData.map(d => d.days), 1);

            const chartColors = ['#6366f1', '#8b5cf6', '#a78bfa', '#c4b5fd', '#ddd6fe'];
            const getExpiryColor = (days) => {
                if (days <= 30) return '#ef4444';
                if (days <= 90) return '#f59e0b';
                if (days <= 180) return '#3b82f6';
                return '#22c55e';
            };
            // -----------------------------

            return (
                <div className="space-y-8">
                    <div className="flex items-center justify-between">
                        <div>
                            <h1 className="text-4xl font-bold mb-2">Welcome to PharmaFlow</h1>
                            <p className={`text-lg ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                Here's what's happening with your pharmacy today.
                            </p>
                        </div>
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-4 rounded-2xl`}>
                            <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Today's Date</p>
                            <p className="text-xl font-bold">{new Date().toLocaleDateString('en-IN')}</p>
                        </div>
                    </div>

                    {/* Enhanced Stats Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {stats.map((stat, index) => (
                            <div key={index} className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl hover-scale relative overflow-hidden group cursor-pointer border ${darkMode ? 'border-white/5 hover:border-white/20' : 'border-black/5 hover:border-black/10'} transition-all duration-300 shadow-sm hover:shadow-xl`}>
                                <div className="absolute inset-0 bg-gradient-to-br from-white/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                <div className="flex items-center justify-between mb-4 relative z-10">
                                    <div className={`p-3 rounded-xl bg-gradient-to-br from-${stat.color}-100 to-${stat.color}-200 dark:from-${stat.color}-900/50 dark:to-${stat.color}-800/50 shadow-inner`}>
                                        <i data-lucide={stat.icon} className={`w-6 h-6 text-${stat.color}-600 dark:text-${stat.color}-400`}></i>
                                    </div>
                                    <div className={`flex items-center space-x-1 font-semibold text-sm px-2 py-1 rounded-full ${stat.trendUp ? 'bg-green-100/50 text-green-600 dark:bg-green-900/30 dark:text-green-400' : 'bg-red-100/50 text-red-600 dark:bg-red-900/30 dark:text-red-400'}`}>
                                        <i data-lucide={stat.trendUp ? 'trending-up' : 'trending-down'} className="w-4 h-4"></i>
                                        <span>{stat.trend}</span>
                                    </div>
                                </div>
                                <div className="relative z-10">
                                    <p className={`text-sm font-medium ${darkMode ? 'text-gray-400' : 'text-gray-500'} mb-1`}>{stat.title}</p>
                                    <p className={`text-3xl font-bold ${darkMode ? 'text-white' : 'text-gray-900'} tracking-tight`}>{stat.value}</p>
                                </div>
                                <div className={`absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-${stat.color}-400 to-${stat.color}-600 opacity-50 group-hover:opacity-100 transition-opacity`}></div>
                            </div>
                        ))}
                    </div>

                    {/* Quick Actions */}
                    <div className={`${darkMode ? 'dark-glassmorphism border-white/5' : 'glassmorphism border-black/5'} p-6 rounded-2xl border shadow-sm`}>
                        <h3 className={`text-xl font-semibold mb-6 ${darkMode ? 'text-white' : 'text-gray-900'}`}>Quick Actions</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            {quickActions.map((action, index) => (
                                <button
                                    key={index}
                                    onClick={() => setCurrentPage(action.action)}
                                    className={`p-6 rounded-xl border border-dashed ${darkMode ? 'border-gray-700 hover:border-blue-400 hover:bg-blue-900/20' : 'border-gray-300 hover:border-blue-500 hover:bg-blue-50'} transition-all duration-300 group flex flex-col items-center justify-center`}
                                >
                                    <div className={`w-14 h-14 mb-4 rounded-full bg-gradient-to-br from-${action.color}-100 to-${action.color}-200 dark:from-${action.color}-900/40 dark:to-${action.color}-800/40 flex items-center justify-center group-hover:scale-110 transition-transform duration-300 shadow-sm group-hover:shadow-md`}>
                                        <i data-lucide={action.icon} className={`w-6 h-6 text-${action.color}-600 dark:text-${action.color}-400`}></i>
                                    </div>
                                    <p className={`font-medium text-sm ${darkMode ? 'text-gray-300 group-hover:text-blue-300' : 'text-gray-700 group-hover:text-blue-700'} transition-colors`}>{action.title}</p>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Real-time Charts Section - Pure CSS */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-8">
                        {/* Bar Chart: Inventory Value by Category */}
                        <div className={`${darkMode ? 'dark-glassmorphism border-white/5' : 'glassmorphism border-black/5'} p-6 rounded-2xl border shadow-sm`}>
                            <h3 className={`text-xl font-semibold mb-6 ${darkMode ? 'text-white' : 'text-gray-900'} flex items-center`}>
                                <i data-lucide="pie-chart" className="w-5 h-5 mr-2 text-indigo-500"></i>
                                Top Categories Value
                            </h3>
                            <div className="space-y-4">
                                {categoryData.length > 0 ? categoryData.map((item, idx) => (
                                    <div key={idx} className="group">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className={`text-sm font-medium ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>{item.name}</span>
                                            <span className={`text-sm font-bold ${darkMode ? 'text-indigo-300' : 'text-indigo-600'}`}>₹{item.value.toLocaleString()}</span>
                                        </div>
                                        <div className={`w-full h-8 rounded-lg overflow-hidden ${darkMode ? 'bg-gray-800' : 'bg-gray-100'}`}>
                                            <div
                                                className="h-full rounded-lg transition-all duration-1000 ease-out group-hover:opacity-80"
                                                style={{
                                                    width: `${(item.value / maxCategoryValue) * 100}%`,
                                                    background: `linear-gradient(90deg, ${chartColors[idx] || '#6366f1'}, ${chartColors[Math.min(idx + 1, chartColors.length - 1)]})`
                                                }}
                                            ></div>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="h-48 flex items-center justify-center text-gray-500">No category data available</div>
                                )}
                            </div>
                        </div>

                        {/* Horizontal Bar Chart: Gantt/Expiry Timeline */}
                        <div className={`${darkMode ? 'dark-glassmorphism border-white/5' : 'glassmorphism border-black/5'} p-6 rounded-2xl border shadow-sm`}>
                            <h3 className={`text-xl font-semibold mb-6 ${darkMode ? 'text-white' : 'text-gray-900'} flex items-center`}>
                                <i data-lucide="bar-chart-2" className="w-5 h-5 mr-2 text-rose-500"></i>
                                Medicine Expiry Timeline
                            </h3>
                            <div className="space-y-3">
                                {expiryData.length > 0 ? expiryData.map((item, idx) => (
                                    <div key={idx} className="group relative">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className={`text-xs font-medium ${darkMode ? 'text-gray-300' : 'text-gray-700'} w-32 truncate`} title={item.name}>{item.name}</span>
                                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full`} style={{ backgroundColor: getExpiryColor(item.days) + '20', color: getExpiryColor(item.days) }}>
                                                {item.days} days — {item.fullDate}
                                            </span>
                                        </div>
                                        <div className={`w-full h-6 rounded-md overflow-hidden ${darkMode ? 'bg-gray-800' : 'bg-gray-100'}`}>
                                            <div
                                                className="h-full rounded-md transition-all duration-1000 ease-out group-hover:brightness-110 flex items-center justify-end pr-2"
                                                style={{
                                                    width: `${Math.max((item.days / maxExpiryDays) * 100, 8)}%`,
                                                    backgroundColor: getExpiryColor(item.days)
                                                }}
                                            >
                                                <span className="text-white text-xs font-bold drop-shadow">{item.days}d</span>
                                            </div>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="h-48 flex items-center justify-center text-gray-500">No expiry data available</div>
                                )}
                                {expiryData.length > 0 && (
                                    <div className="flex items-center justify-center gap-4 mt-4 pt-3 border-t border-white/10">
                                        <span className="flex items-center gap-1.5 text-xs"><span className="w-3 h-3 rounded-full bg-red-500"></span> {'<'}30 days</span>
                                        <span className="flex items-center gap-1.5 text-xs"><span className="w-3 h-3 rounded-full bg-yellow-500"></span> 30-90 days</span>
                                        <span className="flex items-center gap-1.5 text-xs"><span className="w-3 h-3 rounded-full bg-blue-500"></span> 90-180 days</span>
                                        <span className="flex items-center gap-1.5 text-xs"><span className="w-3 h-3 rounded-full bg-green-500"></span> 180+ days</span>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Enhanced Activity Sections */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-8">
                        {/* Recent Medicines */}
                        <div className={`${darkMode ? 'dark-glassmorphism border-white/5' : 'glassmorphism border-black/5'} p-6 rounded-2xl border shadow-sm flex flex-col`}>
                            <div className="flex items-center justify-between mb-6">
                                <h3 className={`text-xl font-semibold ${darkMode ? 'text-white' : 'text-gray-900'}`}>Recent Medicines</h3>
                                <div className="p-2 rounded-lg bg-blue-100/50 dark:bg-blue-900/30">
                                    <i data-lucide="pill" className="w-5 h-5 text-blue-600 dark:text-blue-400"></i>
                                </div>
                            </div>
                            <div className="space-y-3 flex-1">
                                {medicines.slice(0, 4).map(med => (
                                    <div key={med.id} className={`flex items-center justify-between p-3 rounded-xl border border-transparent ${darkMode ? 'hover:bg-white/5 hover:border-white/10' : 'hover:bg-black/5 hover:border-black/5'} transition-all duration-300 group`}>
                                        <div className="flex items-center space-x-3">
                                            <div className="w-10 h-10 bg-gradient-to-br from-blue-100 to-indigo-100 dark:from-blue-900/50 dark:to-indigo-900/50 rounded-lg flex items-center justify-center shadow-sm group-hover:scale-105 transition-transform duration-300">
                                                <i data-lucide="pill" className="w-5 h-5 text-blue-600 dark:text-blue-400"></i>
                                            </div>
                                            <div>
                                                <p className={`font-medium text-sm ${darkMode ? 'text-gray-200 group-hover:text-white' : 'text-gray-800 group-hover:text-gray-900'} transition-colors`}>{med.name}</p>
                                                <p className={`text-xs ${darkMode ? 'text-gray-500' : 'text-gray-500'} mt-0.5`}>Qty: <span className="font-medium">{med.quantity}</span></p>
                                            </div>
                                        </div>
                                        <span className={`px-2.5 py-1 rounded-md text-xs font-medium border ${med.quantity <= 10 ? 'bg-red-50 text-red-600 border-red-100 dark:bg-red-900/20 dark:text-red-400 dark:border-red-900/30' : 'bg-green-50 text-green-600 border-green-100 dark:bg-green-900/20 dark:text-green-400 dark:border-green-900/30'}`}>
                                            {med.quantity <= 10 ? 'Low' : 'OK'}
                                        </span>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setCurrentPage('inventory')} className={`mt-4 w-full py-2.5 rounded-xl text-sm font-medium ${darkMode ? 'bg-white/5 hover:bg-white/10 text-gray-300' : 'bg-gray-50 hover:bg-gray-100 text-gray-600'} transition-colors`}>
                                View All Medicines
                            </button>
                        </div>

                        {/* Recent Patients */}
                        <div className={`${darkMode ? 'dark-glassmorphism border-white/5' : 'glassmorphism border-black/5'} p-6 rounded-2xl border shadow-sm flex flex-col`}>
                            <div className="flex items-center justify-between mb-6">
                                <h3 className={`text-xl font-semibold ${darkMode ? 'text-white' : 'text-gray-900'}`}>Recent Patients</h3>
                                <div className="p-2 rounded-lg bg-green-100/50 dark:bg-green-900/30">
                                    <i data-lucide="users" className="w-5 h-5 text-green-600 dark:text-green-400"></i>
                                </div>
                            </div>
                            <div className="space-y-3 flex-1">
                                {patients.slice(0, 4).map(patient => (
                                    <div key={patient.id} className={`flex items-center space-x-3 p-3 rounded-xl border border-transparent ${darkMode ? 'hover:bg-white/5 hover:border-white/10' : 'hover:bg-black/5 hover:border-black/5'} transition-all duration-300 group`}>
                                        <div className="w-10 h-10 bg-gradient-to-br from-green-400 to-green-600 rounded-lg flex items-center justify-center shadow-sm group-hover:scale-105 transition-transform duration-300">
                                            <span className="text-white font-bold text-sm shadow-sm">{patient.name.charAt(0)}</span>
                                        </div>
                                        <div>
                                            <p className={`font-medium text-sm ${darkMode ? 'text-gray-200 group-hover:text-white' : 'text-gray-800 group-hover:text-gray-900'} transition-colors`}>{patient.name}</p>
                                            <p className={`text-xs ${darkMode ? 'text-gray-500' : 'text-gray-500'} mt-0.5`}>Age: <span className="font-medium">{patient.age}</span></p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setCurrentPage('patients')} className={`mt-4 w-full py-2.5 rounded-xl text-sm font-medium ${darkMode ? 'bg-white/5 hover:bg-white/10 text-gray-300' : 'bg-gray-50 hover:bg-gray-100 text-gray-600'} transition-colors`}>
                                View All Patients
                            </button>
                        </div>

                        {/* Alerts & Notifications */}
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-xl font-semibold">Alerts</h3>
                                <i data-lucide="bell" className="w-5 h-5 text-red-500"></i>
                            </div>
                            <div className="space-y-3">
                                {expiredCount > 0 && (
                                    <button
                                        onClick={() => setCurrentPage('expired')}
                                        className="w-full p-3 rounded-lg bg-red-100/20 border border-red-200/30 hover:bg-red-100/30 transition-colors text-left"
                                    >
                                        <div className="flex items-center justify-between">
