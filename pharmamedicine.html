                                            <div className="flex items-center space-x-2">
                                                <i data-lucide="alert-circle" className="w-4 h-4 text-red-500"></i>
                                                <p className="text-sm font-medium text-red-600">{expiredCount} Expired Medicines</p>
                                            </div>
                                            <i data-lucide="chevron-right" className="w-4 h-4 text-red-500"></i>
                                        </div>
                                        <p className="text-xs text-red-500 mt-1 ml-6">Click to view expired medicines</p>
                                    </button>
                                )}
                                {nearExpiryCount > 0 && (
                                    <button
                                        onClick={() => setCurrentPage('expired')}
                                        className="w-full p-3 rounded-lg bg-yellow-100/20 border border-yellow-200/30 hover:bg-yellow-100/30 transition-colors text-left"
                                    >
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center space-x-2">
                                                <i data-lucide="clock" className="w-4 h-4 text-yellow-500"></i>
                                                <p className="text-sm font-medium text-yellow-600">{nearExpiryCount} Near Expiry</p>
                                            </div>
                                            <i data-lucide="chevron-right" className="w-4 h-4 text-yellow-500"></i>
                                        </div>
                                        <p className="text-xs text-yellow-500 mt-1 ml-6">Medicines expiring within 30 days</p>
                                    </button>
                                )}
                                {lowStockCount > 0 && (
                                    <button
                                        onClick={() => setCurrentPage('inventory')}
                                        className="w-full p-3 rounded-lg bg-orange-100/20 border border-orange-200/30 hover:bg-orange-100/30 transition-colors text-left"
                                    >
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center space-x-2">
                                                <i data-lucide="alert-triangle" className="w-4 h-4 text-orange-500"></i>
                                                <p className="text-sm font-medium text-orange-600">{lowStockCount} Low Stock Items</p>
                                            </div>
                                            <i data-lucide="chevron-right" className="w-4 h-4 text-orange-500"></i>
                                        </div>
                                        <p className="text-xs text-orange-500 mt-1 ml-6">Items with quantity ≤ 10</p>
                                    </button>
                                )}
                                {expiredCount === 0 && nearExpiryCount === 0 && lowStockCount === 0 && (
                                    <div className="p-3 rounded-lg bg-green-100/20 border border-green-200/30">
                                        <div className="flex items-center space-x-2">
                                            <i data-lucide="check-circle" className="w-4 h-4 text-green-500"></i>
                                            <p className="text-sm font-medium text-green-600">All systems normal</p>
                                        </div>
                                        <p className="text-xs text-green-500 mt-1 ml-6">No alerts at this time</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Inventory Management Component
        const InventoryManagement = ({ medicines, setMedicines, darkMode, searchTerm }) => {
            const [showAddForm, setShowAddForm] = useState(false);
            const [editingMedicine, setEditingMedicine] = useState(null);
            const [sortBy, setSortBy] = useState('name');
            const [filterBy, setFilterBy] = useState('all');

            const filteredMedicines = medicines.filter(med =>
                med.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                med.category.toLowerCase().includes(searchTerm.toLowerCase())
            ).filter(med => {
                if (filterBy === 'expired') return new Date(med.expiryDate) <= new Date();
                if (filterBy === 'low-stock') return med.quantity <= 10;
                return true;
            }).sort((a, b) => {
                if (sortBy === 'name') return a.name.localeCompare(b.name);
                if (sortBy === 'quantity') return b.quantity - a.quantity;
                if (sortBy === 'expiry') return new Date(a.expiryDate) - new Date(b.expiryDate);
                return 0;
            });

            const handleAddMedicine = (medicineData) => {
                const newMedicine = {
                    id: Date.now(),
                    ...medicineData
                };
                setMedicines([...medicines, newMedicine]);
                setShowAddForm(false);
            };

            const handleEditMedicine = (medicineData) => {
                setMedicines(medicines.map(med =>
                    med.id === editingMedicine.id ? { ...editingMedicine, ...medicineData } : med
                ));
                setEditingMedicine(null);
            };

            const handleDeleteMedicine = (id) => {
                setMedicines(medicines.filter(med => med.id !== id));
            };

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h1 className="text-3xl font-bold">Inventory Management</h1>
                        <button
                            onClick={() => setShowAddForm(true)}
                            className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors flex items-center space-x-2"
                        >
                            <i data-lucide="plus" className="w-5 h-5"></i>
                            <span>Add Medicine</span>
                        </button>
                    </div>

                    {/* Filters */}
                    <div className="flex flex-wrap gap-4">
                        <select
                            value={sortBy}
                            onChange={(e) => setSortBy(e.target.value)}
                            className={`px-4 py-2 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                        >
                            <option value="name">Sort by Name</option>
                            <option value="quantity">Sort by Quantity</option>
                            <option value="expiry">Sort by Expiry</option>
                        </select>
                        <select
                            value={filterBy}
                            onChange={(e) => setFilterBy(e.target.value)}
                            className={`px-4 py-2 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                        >
                            <option value="all">All Medicines</option>
                            <option value="expired">Expired</option>
                            <option value="low-stock">Low Stock</option>
                        </select>
                    </div>

                    {/* Medicines Table */}
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl overflow-hidden`}>
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className={`${darkMode ? 'bg-blue-900/50' : 'bg-white/50'}`}>
                                    <tr>
                                        <th className="px-6 py-4 text-left font-semibold">Medicine Name</th>
                                        <th className="px-6 py-4 text-left font-semibold">Category</th>
                                        <th className="px-6 py-4 text-left font-semibold">Quantity</th>
                                        <th className="px-6 py-4 text-left font-semibold">Price</th>
                                        <th className="px-6 py-4 text-left font-semibold">Expiry Date</th>
                                        <th className="px-6 py-4 text-left font-semibold">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredMedicines.map(medicine => (
                                        <tr key={medicine.id} className="border-t border-white/10">
                                            <td className="px-6 py-4">
                                                <div>
                                                    <p className="font-medium">{medicine.name}</p>
                                                    <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Batch: {medicine.batchNumber}</p>
                                                </div>
                                            </td>
                                            <td className="px-6 py-4">{medicine.category}</td>
                                            <td className="px-6 py-4">
                                                <span className={`px-2 py-1 rounded-full text-sm ${medicine.quantity <= 10 ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}`}>
                                                    {medicine.quantity}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4">
                                                {currencies.find(c => c.code === medicine.currency)?.symbol}{medicine.price}
                                            </td>
                                            <td className="px-6 py-4">
                                                <span className={`${new Date(medicine.expiryDate) <= new Date() ? 'text-red-500' : ''}`}>
                                                    {medicine.expiryDate}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4">
                                                <div className="flex space-x-2">
                                                    <button
                                                        onClick={() => setEditingMedicine(medicine)}
                                                        className="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors"
                                                    >
                                                        <i data-lucide="edit" className="w-4 h-4"></i>
                                                    </button>
                                                    <button
                                                        onClick={() => handleDeleteMedicine(medicine.id)}
                                                        className="p-2 text-red-600 hover:bg-red-100 rounded-lg transition-colors"
                                                    >
                                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Add/Edit Medicine Modal */}
                    {(showAddForm || editingMedicine) && (
                        <MedicineForm
                            medicine={editingMedicine}
                            onSubmit={editingMedicine ? handleEditMedicine : handleAddMedicine}
                            onCancel={() => {
                                setShowAddForm(false);
                                setEditingMedicine(null);
                            }}
                            darkMode={darkMode}
                        />
                    )}
                </div>
            );
        };

        // Medicine Form Component
        const MedicineForm = ({ medicine, onSubmit, onCancel, darkMode }) => {
            const [formData, setFormData] = useState({
                name: medicine?.name || '',
                category: medicine?.category || '',
                quantity: medicine?.quantity || '',
                price: medicine?.price || '',
                currency: medicine?.currency || 'INR',
                expiryDate: medicine?.expiryDate || '',
                batchNumber: medicine?.batchNumber || '',
                supplier: medicine?.supplier || ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl p-6 w-full max-w-md animate-fade-in`}>
                        <h2 className="text-2xl font-bold mb-6">{medicine ? 'Edit Medicine' : 'Add New Medicine'}</h2>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label htmlFor="medicineName" className="block text-sm font-medium mb-2">Medicine Name</label>
                                <input
                                    id="medicineName"
                                    type="text"
                                    value={formData.name}
                                    onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="category" className="block text-sm font-medium mb-2">Category</label>
                                <input
                                    id="category"
                                    type="text"
                                    value={formData.category}
                                    onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label htmlFor="quantity" className="block text-sm font-medium mb-2">Quantity</label>
                                    <input
                                        id="quantity"
                                        type="number"
                                        value={formData.quantity}
                                        onChange={(e) => setFormData({ ...formData, quantity: parseInt(e.target.value) })}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                        required
                                    />
                                </div>
                                <div>
                                    <label htmlFor="price" className="block text-sm font-medium mb-2">Price</label>
                                    <div className="flex">
                                        <select
                                            value={formData.currency}
                                            onChange={(e) => setFormData({ ...formData, currency: e.target.value })}
                                            className={`px-3 py-3 rounded-l-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                        >
                                            {currencies.map(curr => (
                                                <option key={curr.code} value={curr.code}>{curr.code}</option>
                                            ))}
                                        </select>
                                        <input
                                            id="price"
                                            type="number"
                                            value={formData.price}
                                            onChange={(e) => setFormData({ ...formData, price: parseFloat(e.target.value) })}
                                            className={`flex-1 px-4 py-3 rounded-r-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                            required
                                        />
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label htmlFor="expiryDate" className="block text-sm font-medium mb-2">Expiry Date</label>
                                <input
                                    id="expiryDate"
                                    type="date"
                                    value={formData.expiryDate}
                                    onChange={(e) => setFormData({ ...formData, expiryDate: e.target.value })}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="batchNumber" className="block text-sm font-medium mb-2">Batch Number</label>
                                <input
                                    id="batchNumber"
                                    type="text"
                                    value={formData.batchNumber}
                                    onChange={(e) => setFormData({ ...formData, batchNumber: e.target.value })}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="supplier" className="block text-sm font-medium mb-2">Supplier</label>
                                <input
                                    id="supplier"
                                    type="text"
                                    value={formData.supplier}
                                    onChange={(e) => setFormData({ ...formData, supplier: e.target.value })}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div className="flex space-x-4 pt-4">
                                <button
                                    type="submit"
                                    className="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors"
                                >
                                    {medicine ? 'Update Medicine' : 'Add Medicine'}
                                </button>
                                <button
                                    type="button"
                                    onClick={onCancel}
                                    className="flex-1 bg-gray-500 text-white py-3 rounded-lg hover:bg-gray-600 transition-colors"
                                >
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // Expired Medicines Component
        const ExpiredMedicines = ({ medicines, darkMode }) => {
            const today = new Date();
            const expiredMedicines = medicines.filter(med => new Date(med.expiryDate) <= today);
            const nearExpiryMedicines = medicines.filter(med => {
                const expiryDate = new Date(med.expiryDate);
                const daysUntilExpiry = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
                return daysUntilExpiry > 0 && daysUntilExpiry <= 30;
            });

            const generateReport = () => {
                const reportData = {
                    expired: expiredMedicines,
                    nearExpiry: nearExpiryMedicines,
                    generatedAt: new Date().toISOString()
                };

                const dataStr = JSON.stringify(reportData, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'expired-medicines-report.json';
                link.click();
            };

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h1 className="text-3xl font-bold">Expired Medicines</h1>
                        <button
                            onClick={generateReport}
                            className="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700 transition-colors flex items-center space-x-2"
                        >
                            <i data-lucide="download" className="w-5 h-5"></i>
                            <span>Generate Report</span>
                        </button>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Expired</p>
                                    <p className="text-3xl font-bold text-red-500">{expiredMedicines.length}</p>
                                </div>
                                <i data-lucide="alert-circle" className="w-8 h-8 text-red-500"></i>
                            </div>
                        </div>
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Near Expiry (30 days)</p>
                                    <p className="text-3xl font-bold text-yellow-500">{nearExpiryMedicines.length}</p>
                                </div>
                                <i data-lucide="clock" className="w-8 h-8 text-yellow-500"></i>
                            </div>
                        </div>
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl`}>
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Total Value Lost</p>
                                    <p className="text-3xl font-bold text-red-500">
                                        ₹{expiredMedicines.reduce((sum, med) => sum + (med.price * med.quantity), 0).toLocaleString()}
                                    </p>
                                </div>
                                <i data-lucide="trending-down" className="w-8 h-8 text-red-500"></i>
                            </div>
                        </div>
                    </div>

                    {/* Expired Medicines Table */}
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl overflow-hidden`}>
                        <div className="p-6 border-b border-white/10">
                            <h3 className="text-xl font-semibold text-red-500">Expired Medicines</h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className={`${darkMode ? 'bg-red-900/20' : 'bg-red-50'}`}>
                                    <tr>
                                        <th className="px-6 py-4 text-left font-semibold">Medicine Name</th>
                                        <th className="px-6 py-4 text-left font-semibold">Batch Number</th>
                                        <th className="px-6 py-4 text-left font-semibold">Quantity</th>
                                        <th className="px-6 py-4 text-left font-semibold">Expired Date</th>
                                        <th className="px-6 py-4 text-left font-semibold">Value Lost</th>
                                        <th className="px-6 py-4 text-left font-semibold">Supplier</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {expiredMedicines.map(medicine => (
                                        <tr key={medicine.id} className="border-t border-white/10">
                                            <td className="px-6 py-4 font-medium">{medicine.name}</td>
                                            <td className="px-6 py-4">{medicine.batchNumber}</td>
                                            <td className="px-6 py-4">{medicine.quantity}</td>
                                            <td className="px-6 py-4 text-red-500">{medicine.expiryDate}</td>
                                            <td className="px-6 py-4 text-red-500">
                                                {currencies.find(c => c.code === medicine.currency)?.symbol}{(medicine.price * medicine.quantity).toLocaleString()}
                                            </td>
                                            <td className="px-6 py-4">{medicine.supplier}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Near Expiry Medicines */}
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl overflow-hidden`}>
                        <div className="p-6 border-b border-white/10">
                            <h3 className="text-xl font-semibold text-yellow-500">Near Expiry (Next 30 Days)</h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className={`${darkMode ? 'bg-yellow-900/20' : 'bg-yellow-50'}`}>
                                    <tr>
                                        <th className="px-6 py-4 text-left font-semibold">Medicine Name</th>
                                        <th className="px-6 py-4 text-left font-semibold">Batch Number</th>
                                        <th className="px-6 py-4 text-left font-semibold">Quantity</th>
                                        <th className="px-6 py-4 text-left font-semibold">Expiry Date</th>
                                        <th className="px-6 py-4 text-left font-semibold">Days Left</th>
                                        <th className="px-6 py-4 text-left font-semibold">Supplier</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {nearExpiryMedicines.map(medicine => {
                                        const daysLeft = Math.ceil((new Date(medicine.expiryDate) - today) / (1000 * 60 * 60 * 24));
                                        return (
                                            <tr key={medicine.id} className="border-t border-white/10">
                                                <td className="px-6 py-4 font-medium">{medicine.name}</td>
                                                <td className="px-6 py-4">{medicine.batchNumber}</td>
                                                <td className="px-6 py-4">{medicine.quantity}</td>
                                                <td className="px-6 py-4 text-yellow-500">{medicine.expiryDate}</td>
                                                <td className="px-6 py-4">
                                                    <span className={`px-2 py-1 rounded-full text-sm ${daysLeft <= 7 ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800'}`}>
                                                        {daysLeft} days
                                                    </span>
                                                </td>
                                                <td className="px-6 py-4">{medicine.supplier}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // Patient Management Component
        const PatientManagement = ({ patients, setPatients, darkMode, searchTerm }) => {
            const [showAddForm, setShowAddForm] = useState(false);
            const [editingPatient, setEditingPatient] = useState(null);

            const filteredPatients = patients.filter(patient =>
                patient.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                patient.phone.includes(searchTerm) ||
                patient.email.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const handleAddPatient = (patientData) => {
                const newPatient = {
                    id: Date.now(),
                    ...patientData
                };
                setPatients([...patients, newPatient]);
                setShowAddForm(false);
            };

            const handleEditPatient = (patientData) => {
                setPatients(patients.map(patient =>
                    patient.id === editingPatient.id ? { ...editingPatient, ...patientData } : patient
                ));
                setEditingPatient(null);
            };

            const handleDeletePatient = (id) => {
                setPatients(patients.filter(patient => patient.id !== id));
            };

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h1 className="text-3xl font-bold">Patient Management</h1>
                        <button
                            onClick={() => setShowAddForm(true)}
                            className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors flex items-center space-x-2"
                        >
                            <i data-lucide="user-plus" className="w-5 h-5"></i>
                            <span>Add Patient</span>
                        </button>
                    </div>

                    {/* Patients Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredPatients.map(patient => (
                            <div key={patient.id} className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl hover-scale`}>
                                <div className="flex items-start justify-between mb-4">
                                    <div className="flex items-center space-x-3">
                                        <div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center">
                                            <span className="text-white font-bold text-lg">{patient.name.charAt(0)}</span>
                                        </div>
                                        <div>
                                            <h3 className="font-semibold text-lg">{patient.name}</h3>
                                            <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Age: {patient.age}</p>
                                        </div>
                                    </div>
                                    <div className="flex space-x-2">
                                        <button
                                            onClick={() => setEditingPatient(patient)}
                                            className="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors"
                                        >
                                            <i data-lucide="edit" className="w-4 h-4"></i>
                                        </button>
                                        <button
                                            onClick={() => handleDeletePatient(patient.id)}
                                            className="p-2 text-red-600 hover:bg-red-100 rounded-lg transition-colors"
                                        >
                                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <div className="flex items-center space-x-2">
                                        <i data-lucide="phone" className="w-4 h-4 text-gray-500"></i>
                                        <span className="text-sm">{patient.phone}</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <i data-lucide="mail" className="w-4 h-4 text-gray-500"></i>
                                        <span className="text-sm">{patient.email}</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <i data-lucide="map-pin" className="w-4 h-4 text-gray-500"></i>
                                        <span className="text-sm">{patient.address}</span>
                                    </div>
                                    <div className="mt-3">
                                        <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Medical History:</p>
                                        <p className="text-sm font-medium">{patient.medicalHistory}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Add/Edit Patient Modal */}
                    {(showAddForm || editingPatient) && (
                        <PatientForm
                            patient={editingPatient}
                            onSubmit={editingPatient ? handleEditPatient : handleAddPatient}
                            onCancel={() => {
                                setShowAddForm(false);
                                setEditingPatient(null);
                            }}
                            darkMode={darkMode}
                        />
                    )}
                </div>
            );
        };

        // Patient Form Component
        const PatientForm = ({ patient, onSubmit, onCancel, darkMode }) => {
            const [formData, setFormData] = useState({
                name: patient?.name || '',
                age: patient?.age || '',
                phone: patient?.phone || '',
                email: patient?.email || '',
                address: patient?.address || '',
                medicalHistory: patient?.medicalHistory || ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl p-6 w-full max-w-md animate-fade-in`}>
                        <h2 className="text-2xl font-bold mb-6">{patient ? 'Edit Patient' : 'Add New Patient'}</h2>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label htmlFor="patientName" className="block text-sm font-medium mb-2">Full Name</label>
                                <input
                                    id="patientName"
                                    type="text"
                                    value={formData.name}
                                    onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label htmlFor="age" className="block text-sm font-medium mb-2">Age</label>
                                    <input
                                        id="age"
                                        type="number"
                                        value={formData.age}
                                        onChange={(e) => setFormData({ ...formData, age: parseInt(e.target.value) })}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                        required
                                    />
                                </div>
                                <div>
                                    <label htmlFor="phone" className="block text-sm font-medium mb-2">Phone</label>
                                    <input
                                        id="phone"
                                        type="tel"
                                        value={formData.phone}
                                        onChange={(e) => setFormData({ ...formData, phone: e.target.value })}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                        required
                                    />
                                </div>
                            </div>

                            <div>
                                <label htmlFor="email" className="block text-sm font-medium mb-2">Email</label>
                                <input
                                    id="email"
                                    type="email"
                                    value={formData.email}
                                    onChange={(e) => setFormData({ ...formData, email: e.target.value })}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="address" className="block text-sm font-medium mb-2">Address</label>
                                <textarea
                                    id="address"
                                    value={formData.address}
                                    onChange={(e) => setFormData({ ...formData, address: e.target.value })}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    rows="3"
                                    required
                                />
                            </div>

                            <div>
                                <label htmlFor="medicalHistory" className="block text-sm font-medium mb-2">Medical History</label>
                                <textarea
                                    id="medicalHistory"
                                    value={formData.medicalHistory}
                                    onChange={(e) => setFormData({ ...formData, medicalHistory: e.target.value })}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    rows="3"
                                    placeholder="Enter medical conditions, allergies, etc."
                                />
                            </div>

                            <div className="flex space-x-4 pt-4">
                                <button
                                    type="submit"
                                    className="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors"
                                >
                                    {patient ? 'Update Patient' : 'Add Patient'}
                                </button>
                                <button
                                    type="button"
                                    onClick={onCancel}
                                    className="flex-1 bg-gray-500 text-white py-3 rounded-lg hover:bg-gray-600 transition-colors"
                                >
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // Prescription Management Component
        const PrescriptionManagement = ({ patients, medicines, darkMode }) => {
            const [prescriptions, setPrescriptions] = useState([]);
            const [showAddForm, setShowAddForm] = useState(false);

            const handleAddPrescription = (prescriptionData) => {
                const newPrescription = {
                    id: Date.now(),
                    ...prescriptionData,
                    date: new Date().toISOString().split('T')[0]
                };
                setPrescriptions([...prescriptions, newPrescription]);
                setShowAddForm(false);
            };

            const printPrescription = (prescription) => {
                const printWindow = window.open('', '_blank');
                const patient = patients.find(p => p.id === prescription.patientId);

                printWindow.document.write(`
                    <html>
                        <head>
                            <title>Prescription - ${patient?.name}</title>
                            <style>
                                body { font-family: Arial, sans-serif; padding: 20px; }
                                .header { text-align: center; margin-bottom: 30px; }
                                .patient-info { margin-bottom: 20px; }
                                .medicines { margin-top: 20px; }
                                table { width: 100%; border-collapse: collapse; }
                                th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                                th { background-color: #f2f2f2; }
                            </style>
                        </head>
                        <body>
                            <div class="header">
                                <h1>PharmaFlow</h1>
                                <h2>Medical Prescription</h2>
                            </div>
                            <div class="patient-info">
                                <p><strong>Patient:</strong> ${patient?.name}</p>
                                <p><strong>Age:</strong> ${patient?.age}</p>
                                <p><strong>Date:</strong> ${prescription.date}</p>
                                <p><strong>Doctor:</strong> ${prescription.doctor}</p>
                            </div>
                            <div class="medicines">
                                <h3>Prescribed Medicines:</h3>
                                <table>
                                    <tr>
                                        <th>Medicine</th>
                                        <th>Dosage</th>
                                        <th>Frequency</th>
                                        <th>Duration</th>
                                    </tr>
                                    ${prescription.medicines.map(med => `
                                        <tr>
                                            <td>${med.name}</td>
                                            <td>${med.dosage}</td>
                                            <td>${med.frequency}</td>
                                            <td>${med.duration}</td>
                                        </tr>
                                    `).join('')}
                                </table>
                            </div>
                            <div style="margin-top: 30px;">
                                <p><strong>Notes:</strong> ${prescription.notes || 'None'}</p>
                            </div>
                        </body>
                    </html>
                `);
                printWindow.document.close();
                printWindow.print();
            };

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h1 className="text-3xl font-bold">Prescription Management</h1>
                        <button
                            onClick={() => setShowAddForm(true)}
                            className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors flex items-center space-x-2"
                        >
                            <i data-lucide="file-plus" className="w-5 h-5"></i>
                            <span>New Prescription</span>
                        </button>
                    </div>

                    {/* Prescriptions List */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {prescriptions.map(prescription => {
                            const patient = patients.find(p => p.id === prescription.patientId);
                            const displayName = prescription.patientName || patient?.name || 'Unknown Patient';
                            return (
                                <div key={prescription.id} className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl hover-scale`}>
                                    <div className="flex items-start justify-between mb-4">
                                        <div>
                                            <h3 className="text-lg font-semibold">{displayName}</h3>
                                            <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                                Dr. {prescription.doctor} • {prescription.date}
                                            </p>
                                        </div>
                                        <button
                                            onClick={() => printPrescription(prescription)}
                                            className="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors"
                                        >
                                            <i data-lucide="printer" className="w-5 h-5"></i>
                                        </button>
                                    </div>

                                    <div className="space-y-2">
                                        <h4 className="font-medium">Prescribed Medicines:</h4>
                                        {prescription.medicines.map((med, index) => (
                                            <div key={index} className="bg-white/10 p-3 rounded-lg">
                                                <p className="font-medium">{med.name}</p>
                                                <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>
                                                    {med.dosage} • {med.frequency} • {med.duration}
                                                </p>
                                            </div>
                                        ))}
                                    </div>

                                    {prescription.notes && (
                                        <div className="mt-4">
                                            <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Notes:</p>
                                            <p className="text-sm">{prescription.notes}</p>
                                        </div>
                                    )}

                                    {prescription.pdfData && (
                                        <div className="mt-4 pt-4 border-t border-white/10 flex items-center justify-between">
                                            <div className="flex items-center space-x-2 text-sm text-blue-500">
                                                <i data-lucide="file-text" className="w-5 h-5"></i>
                                                <span className="truncate max-w-[150px] font-medium">{prescription.pdfName}</span>
                                            </div>
                                            <button
                                                onClick={() => {
                                                    const newWindow = window.open();
                                                    newWindow.document.write(`<iframe width="100%" height="100%" src="${prescription.pdfData}" frameborder="0"></iframe>`);
                                                }}
                                                className="px-3 py-1.5 bg-blue-500/10 text-blue-600 hover:bg-blue-500/20 rounded-lg text-sm font-medium transition-colors cursor-pointer"
                                            >
                                                View Document
                                            </button>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {prescriptions.length === 0 && (
                        <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-12 rounded-2xl text-center`}>
                            <i data-lucide="file-text" className="w-16 h-16 mx-auto mb-4 text-gray-400"></i>
                            <h3 className="text-xl font-semibold mb-2">No Prescriptions Yet</h3>
                            <p className={`${darkMode ? 'text-blue-200' : 'text-gray-600'} mb-4`}>
                                Start by creating your first prescription for a patient.
                            </p>
                            <button
                                onClick={() => setShowAddForm(true)}
                                className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors"
                            >
                                Create Prescription
                            </button>
                        </div>
                    )}

                    {/* Add Prescription Modal */}
                    {showAddForm && (
                        <PrescriptionForm
                            patients={patients}
                            medicines={medicines}
                            onSubmit={handleAddPrescription}
                            onCancel={() => setShowAddForm(false)}
                            darkMode={darkMode}
                        />
                    )}
                </div>
            );
        };

        // Prescription Form Component
        const PrescriptionForm = ({ patients, medicines, onSubmit, onCancel, darkMode }) => {
            const [formData, setFormData] = useState({
                patientName: '',
                doctor: '',
                medicines: [{ name: '', dosage: '', frequency: '', duration: '' }],
                notes: '',
                pdfName: '',
                pdfData: ''
            });

            const handlePdfUpload = (file) => {
                if (file && file.type === "application/pdf") {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setFormData(prev => ({ ...prev, pdfData: reader.result, pdfName: file.name }));
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert("Please upload a valid PDF file.");
                }
            };

            const addMedicine = () => {
                setFormData({
                    ...formData,
                    medicines: [...formData.medicines, { name: '', dosage: '', frequency: '', duration: '' }]
                });
            };

            const removeMedicine = (index) => {
                setFormData({
                    ...formData,
                    medicines: formData.medicines.filter((_, i) => i !== index)
                });
            };

            const updateMedicine = (index, field, value) => {
                const updatedMedicines = formData.medicines.map((med, i) =>
                    i === index ? { ...med, [field]: value } : med
                );
                setFormData({ ...formData, medicines: updatedMedicines });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl p-6 w-full max-w-2xl animate-fade-in max-h-[90vh] overflow-y-auto`}>
                        <h2 className="text-2xl font-bold mb-6">New Prescription</h2>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label htmlFor="patientName" className="block text-sm font-medium mb-2">Patient Name</label>
                                    <input
                                        id="patientName"
                                        type="text"
                                        placeholder="Enter patient name"
                                        value={formData.patientName}
                                        onChange={(e) => setFormData({ ...formData, patientName: e.target.value })}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                        required
                                    />
                                </div>
                                <div>
                                    <label htmlFor="doctor" className="block text-sm font-medium mb-2">Doctor Name</label>
                                    <input
                                        id="doctor"
                                        type="text"
                                        value={formData.doctor}
                                        onChange={(e) => setFormData({ ...formData, doctor: e.target.value })}
                                        className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                        required
                                    />
                                </div>
                            </div>

                            <div>
                                <div className="flex items-center justify-between mb-4">
                                    <label className="block text-sm font-medium">Medicines</label>
                                    <button
                                        type="button"
                                        onClick={addMedicine}
                                        className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center space-x-2"
                                    >
                                        <i data-lucide="plus" className="w-4 h-4"></i>
                                        <span>Add Medicine</span>
                                    </button>
                                </div>

                                {formData.medicines.map((medicine, index) => (
                                    <div key={index} className="grid grid-cols-4 gap-2 mb-3 p-4 bg-white/10 rounded-lg">
                                        <div>
                                            <input
                                                type="text"
                                                placeholder="Medicine Name"
                                                value={medicine.name}
                                                onChange={(e) => updateMedicine(index, 'name', e.target.value)}
                                                className={`w-full px-3 py-2 rounded border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                                required
                                            />
                                        </div>
                                        <input
                                            type="text"
                                            placeholder="Dosage"
                                            value={medicine.dosage}
                                            onChange={(e) => updateMedicine(index, 'dosage', e.target.value)}
                                            className={`px-3 py-2 rounded border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                            required
                                        />
                                        <input
                                            type="text"
                                            placeholder="Frequency"
                                            value={medicine.frequency}
                                            onChange={(e) => updateMedicine(index, 'frequency', e.target.value)}
                                            className={`px-3 py-2 rounded border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                            required
                                        />
                                        <div className="flex space-x-2">
                                            <input
                                                type="text"
                                                placeholder="Duration"
                                                value={medicine.duration}
                                                onChange={(e) => updateMedicine(index, 'duration', e.target.value)}
                                                className={`flex-1 px-3 py-2 rounded border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                                required
                                            />
                                            {formData.medicines.length > 1 && (
                                                <button
                                                    type="button"
                                                    onClick={() => removeMedicine(index)}
                                                    className="p-2 text-red-600 hover:bg-red-100 rounded transition-colors"
                                                >
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div>
                                <label htmlFor="notes" className="block text-sm font-medium mb-2">Notes</label>
                                <textarea
                                    id="notes"
                                    value={formData.notes}
                                    onChange={(e) => setFormData({ ...formData, notes: e.target.value })}
                                    className={`w-full px-4 py-3 rounded-lg border-0 ${darkMode ? 'bg-blue-900/50 text-white' : 'bg-white/50 text-gray-900'} focus:ring-2 focus:ring-blue-500`}
                                    rows="3"
                                    placeholder="Additional instructions or notes..."
                                />
                            </div>

                            {/* Drag & Drop PDF Upload for Prescription */}
                            <div className="mt-4">
                                <label className="block text-sm font-medium mb-2">Upload Prescription Document (PDF)</label>
                                <div className={`border-2 border-dashed ${darkMode ? 'border-blue-500/30 hover:border-blue-400 bg-blue-900/20' : 'border-blue-200 hover:border-blue-400 bg-blue-50'} rounded-xl p-8 text-center transition-colors cursor-pointer flex flex-col items-center justify-center`}
                                    onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('border-blue-500', 'bg-blue-500/10'); }}
                                    onDragLeave={(e) => { e.preventDefault(); e.currentTarget.classList.remove('border-blue-500', 'bg-blue-500/10'); }}
                                    onDrop={(e) => {
                                        e.preventDefault();
                                        e.currentTarget.classList.remove('border-blue-500', 'bg-blue-500/10');
                                        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                                            handlePdfUpload(e.dataTransfer.files[0]);
                                        }
                                    }}
                                    onClick={() => document.getElementById('prescription-upload').click()}
                                >
                                    {formData.pdfName ? (
                                        <div className="flex flex-col items-center">
                                            <i data-lucide="file-check-2" className="w-10 h-10 text-green-500 mb-3"></i>
                                            <p className={`text-sm font-medium ${darkMode ? 'text-green-400' : 'text-green-600'}`}>{formData.pdfName} attached!</p>
                                            <p className={`text-xs mt-1 ${darkMode ? 'text-blue-200/70' : 'text-gray-500'}`}>Click to replace</p>
                                        </div>
                                    ) : (
                                        <>
                                            <i data-lucide="upload-cloud" className="w-10 h-10 text-blue-500 mb-3"></i>
                                            <p className={`text-sm font-medium ${darkMode ? 'text-white' : 'text-gray-700'}`}>Click or drag PDF file to upload</p>
                                            <p className={`text-xs mt-1 ${darkMode ? 'text-blue-200/70' : 'text-gray-500'}`}>PDF up to 10MB</p>
                                        </>
                                    )}
                                    <input type="file" id="prescription-upload" className="hidden" accept=".pdf" onChange={(e) => {
                                        if (e.target.files && e.target.files[0]) {
                                            handlePdfUpload(e.target.files[0]);
                                        }
                                    }} />
                                </div>
                            </div>

                            <div className="flex space-x-4 pt-4">
                                <button
                                    type="submit"
                                    className="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors"
                                >
                                    Create Prescription
                                </button>
                                <button
                                    type="button"
                                    onClick={onCancel}
                                    className="flex-1 bg-gray-500 text-white py-3 rounded-lg hover:bg-gray-600 transition-colors"
                                >
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // Supplier Management Component
        const SupplierManagement = ({ suppliers, setSuppliers, darkMode, searchTerm }) => {
            const [showAddForm, setShowAddForm] = useState(false);
            const [editingSupplier, setEditingSupplier] = useState(null);

            const filteredSuppliers = suppliers.filter(supplier =>
                supplier.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                supplier.company.toLowerCase().includes(searchTerm.toLowerCase()) ||
                supplier.contact.includes(searchTerm)
            );

            const handleAddSupplier = (supplierData) => {
                const newSupplier = {
                    id: Date.now(),
                    ...supplierData
                };
                setSuppliers([...suppliers, newSupplier]);
                setShowAddForm(false);
            };

            const handleEditSupplier = (supplierData) => {
                setSuppliers(suppliers.map(supplier =>
                    supplier.id === editingSupplier.id ? { ...editingSupplier, ...supplierData } : supplier
                ));
                setEditingSupplier(null);
            };

            const handleDeleteSupplier = (id) => {
                setSuppliers(suppliers.filter(supplier => supplier.id !== id));
            };

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h1 className="text-3xl font-bold">Supplier Management</h1>
                        <button
                            onClick={() => setShowAddForm(true)}
                            className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors flex items-center space-x-2"
                        >
                            <i data-lucide="truck" className="w-5 h-5"></i>
                            <span>Add Supplier</span>
                        </button>
                    </div>

                    {/* Suppliers Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredSuppliers.map(supplier => (
                            <div key={supplier.id} className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} p-6 rounded-2xl hover-scale`}>
                                <div className="flex items-start justify-between mb-4">
                                    <div>
                                        <h3 className="font-semibold text-lg">{supplier.name}</h3>
                                        <p className={`text-sm ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>{supplier.company}</p>
                                    </div>
                                    <div className="flex space-x-2">
                                        <button
                                            onClick={() => setEditingSupplier(supplier)}
                                            className="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors"
                                        >
                                            <i data-lucide="edit" className="w-4 h-4"></i>
                                        </button>
                                        <button
                                            onClick={() => handleDeleteSupplier(supplier.id)}
                                            className="p-2 text-red-600 hover:bg-red-100 rounded-lg transition-colors"
                                        >
                                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-2 mb-4">
                                    <div className="flex items-center space-x-2">
                                        <i data-lucide="phone" className="w-4 h-4 text-gray-500"></i>
                                        <span className="text-sm">{supplier.contact}</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <i data-lucide="mail" className="w-4 h-4 text-gray-500"></i>
                                        <span className="text-sm">{supplier.email}</span>
                                    </div>
                                </div>

                                <div>
                                    <p className={`text-sm font-medium mb-2 ${darkMode ? 'text-blue-200' : 'text-gray-600'}`}>Medicines Supplied:</p>
                                    <div className="flex flex-wrap gap-1">
                                        {supplier.medicines.map((medicine, index) => (
                                            <span key={index} className="px-2 py-1 bg-blue-100 text-blue-800 text-xs rounded-full">
                                                {medicine}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                                {supplier.pdfData && (
                                    <div className="mt-4 pt-4 border-t border-white/10 flex items-center justify-between">
                                        <div className="flex items-center space-x-2 text-sm text-blue-500">
                                            <i data-lucide="file-text" className="w-5 h-5"></i>
                                            <span className="truncate max-w-[150px] font-medium">{supplier.pdfName}</span>
                                        </div>
                                        <button
                                            onClick={() => {
                                                const newWindow = window.open();
                                                newWindow.document.write(`<iframe width="100%" height="100%" src="${supplier.pdfData}" frameborder="0"></iframe>`);
                                            }}
                                            className="px-3 py-1.5 bg-blue-500/10 text-blue-600 hover:bg-blue-500/20 rounded-lg text-sm font-medium transition-colors cursor-pointer"
                                        >
                                            View PDF
                                        </button>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    {/* Add/Edit Supplier Modal */}
                    {(showAddForm || editingSupplier) && (
                        <SupplierForm
                            supplier={editingSupplier}
                            onSubmit={editingSupplier ? handleEditSupplier : handleAddSupplier}
                            onCancel={() => {
                                setShowAddForm(false);
                                setEditingSupplier(null);
                            }}
                            darkMode={darkMode}
                        />
                    )}
                </div>
            );
        };

        // Supplier Form Component
        const SupplierForm = ({ supplier, onSubmit, onCancel, darkMode }) => {
            const [formData, setFormData] = useState({
                name: supplier?.name || '',
                company: supplier?.company || '',
                contact: supplier?.contact || '',
                email: supplier?.email || '',
                medicines: supplier?.medicines || [],
                pdfName: supplier?.pdfName || '',
                pdfData: supplier?.pdfData || ''
            });
            const [newMedicine, setNewMedicine] = useState('');

            const handlePdfUpload = (file) => {
                if (file && file.type === "application/pdf") {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setFormData(prev => ({ ...prev, pdfData: reader.result, pdfName: file.name }));
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert("Please upload a valid PDF file.");
                }
            };

            const addMedicine = () => {
                if (newMedicine.trim()) {
                    setFormData({
                        ...formData,
                        medicines: [...formData.medicines, newMedicine.trim()]
                    });
                    setNewMedicine('');
                }
            };

            const removeMedicine = (index) => {
                setFormData({
                    ...formData,
                    medicines: formData.medicines.filter((_, i) => i !== index)
                });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className={`${darkMode ? 'dark-glassmorphism' : 'glassmorphism'} rounded-2xl p-6 w-full max-w-md animate-fade-in`}>
                        <h2 className="text-2xl font-bold mb-6">{supplier ? 'Edit Supplier' : 'Add New Supplier'}</h2>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
